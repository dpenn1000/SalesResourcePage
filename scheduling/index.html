<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduling -- Trinity Solar CT</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth-gate.css">
<script src="https://unpkg.com/@supabase/supabase-js@2.107.0"></script>
<script src="/auth-gate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="/site-back.js" defer></script>
<style>
  :root{
    --green:#78C832; --accent:#29A9E1; --ink:#1A2332; --muted:#6b7a8d;
    --border:#DFE2DA; --bg:#EFF1EC; --surface:#fff; --radius:10px;
    --shadow:0 1px 4px rgba(0,0,0,.07); --red:#D63030; --amber:#C88C00;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:var(--bg); font-family:'Manrope',sans-serif; font-size:15px; line-height:1.5; color:var(--ink);}
  h1,h2,h3,h4{font-family:'Fraunces',serif; font-weight:600;}
  .hdr{background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:14px;}
  .logo{width:32px; height:32px; background:var(--green); border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:700; color:#0b1120; font-size:14px;}
  .htitle{font-family:'Fraunces',serif; font-size:18px; font-weight:700; flex:1;}
  .htitle small{display:block; font-family:'Manrope'; font-size:12px; color:var(--muted); font-weight:500;}
  .hbtn{font-size:13px; color:var(--accent); background:none; border:none; font-weight:600; cursor:pointer;}
  .wrap{max-width:1180px; margin:0 auto; padding:18px 16px 80px;}
  .banner{background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--green); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .banner b{font-size:16px;}
  .pill{display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; letter-spacing:.02em;}
  .pill.not_started{background:#eceff1; color:var(--muted);}
  .pill.draft{background:#fff3d6; color:var(--amber);}
  .pill.submitted{background:#d8edff; color:#1b6fb3;}
  .pill.approved{background:#e2f5d3; color:#3f8f1e;}
  .pill.changes_requested{background:#ffe0dc; color:var(--red);}
  .pill.open{background:#e2f5d3; color:#3f8f1e;}
  .pill.locked{background:#eceff1; color:var(--muted);}
  .tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
  .tab{padding:8px 16px; border:1px solid var(--border); background:var(--surface); border-radius:999px; font-weight:600; font-size:13px; cursor:pointer; color:var(--muted);}
  .tab.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .tabbadge{display:inline-block; background:var(--red); color:#fff; font-size:10px; font-weight:800; min-width:17px; height:17px; line-height:17px; text-align:center; border-radius:999px; padding:0 4px; margin-left:2px;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; box-shadow:var(--shadow);}
  .weekhd{font-family:'Fraunces',serif; font-size:15px; font-weight:700; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border);}
  .daygrid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
  @media(max-width:760px){.daygrid{grid-template-columns:repeat(3,1fr);}}
  .day.sunday{background:#f3f4f6;}
  .day.sunday .dlabel::after{content:' (extra)'; color:#aeb6c2; font-weight:500;}
  .day{border:1px solid var(--border); border-radius:8px; padding:8px;}
  .day .dlabel{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:5px;}
  .day select{width:100%; padding:6px 4px; border:1px solid var(--border); border-radius:6px; font-family:'Manrope'; font-size:13px; background:#fff; color:var(--ink);}
  .day select:disabled{background:#f4f5f2; color:var(--muted);}
  .day.off{background:#fafbf9;}
  .day.rate-help{border-left:4px solid var(--green); background:#f1f9e9;}
  .day.rate-sat{border-left:4px solid var(--amber); background:#fff7e8;}
  .cchip{font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;}
  .cchip.help{background:rgba(94,186,40,.16); color:#3f8f1e;}
  .cchip.sat{background:rgba(200,140,0,.16); color:#9a6a00;}
  .cchip.okk{background:#eceff1; color:var(--muted);}
  .covleg{margin:10px 0 4px; max-width:520px;}
  .covleg-bar{height:11px; border-radius:6px; background:linear-gradient(90deg, hsl(130,64%,42%), hsl(60,60%,48%), hsl(0,64%,48%));}
  .covleg-labels{display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:var(--muted); margin-top:3px;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--muted);}
  .legend span b{color:var(--ink);}
  .actionbar{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:6px;}
  .btn{padding:9px 18px; border-radius:8px; border:none; font-weight:700; font-size:14px; cursor:pointer;}
  .btn-primary{background:var(--green); color:#0b1120;}
  .btn-primary:disabled{background:#cfe6b4; cursor:not-allowed;}
  .btn-ghost{background:#fff; border:1px solid var(--border); color:var(--ink);}
  .att{display:flex; align-items:center; gap:8px; font-size:13px;}
  .att input{width:16px; height:16px;}
  .note{font-size:13px; color:var(--red); background:#fff3f1; border:1px solid #ffd3cc; border-radius:8px; padding:8px 12px;}
  table.tracker{width:100%; border-collapse:collapse; font-size:13px;}
  table.tracker th, table.tracker td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--border);}
  table.tracker th{font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); font-weight:700;}
  table.tracker tr:hover td{background:#fafbf9;}
  .combined{overflow-x:auto;}
  .fullbleed{width:96vw; max-width:96vw; position:relative; left:50%; transform:translateX(-50%);}
  table.cgrid{border-collapse:separate; border-spacing:0; font-size:12px; width:100%; table-layout:fixed;}
  table.cgrid th, table.cgrid td{padding:0; text-align:center; border-bottom:1px solid var(--border);}
  table.cgrid thead th{padding:5px 2px; font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.02em;}
  table.cgrid th.rep, table.cgrid td.rep{text-align:left; position:sticky; left:0; background:var(--surface); font-weight:600; width:160px; min-width:160px; padding:5px 8px; z-index:2; box-shadow:1px 0 0 var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  table.cgrid th.wk{border-left:2px solid var(--border);}
  table.cgrid .wkstart{border-left:2px solid var(--border);}
  table.cgrid tr:hover td.rep{background:#f6f8f3;}
  .cell{display:block; padding:7px 2px; font-weight:700; cursor:pointer; line-height:1;}
  .cell:hover{outline:2px solid var(--accent); outline-offset:-2px;}
  .c-off{color:#c2c9bf; font-weight:500; background:#fbfcfa;}
  .c-ad{color:#2f7d12; background:#e6f5d6;}
  .c-s1{color:#1b6fb3; background:#e7f1fb;}
  .c-s2{color:#9a6a00; background:#fbf0d6;}
  .c-s3{color:#7a3ea8; background:#f1e7f8;}
  .c-combo{color:#33414f; background:#eceff3;}
  table.cgrid select.cellsel{width:100%; font-size:12px; font-family:'Manrope'; border:2px solid var(--accent); border-radius:4px; padding:4px 0; background:#fff; cursor:pointer;}
  .clegend{display:flex; gap:7px; flex-wrap:wrap; font-size:11px; margin-top:10px;}
  .clegend span{padding:2px 8px; border-radius:5px; font-weight:700;}
  table.cov{width:100%; border-collapse:collapse; font-size:13px;}
  table.cov th, table.cov td{text-align:right; padding:9px 10px; border-bottom:1px solid var(--border); white-space:nowrap;}
  table.cov th:first-child, table.cov td.county{text-align:left;}
  table.cov th{font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700;}
  .covbar{height:7px; border-radius:4px; background:#eceff1; overflow:hidden; min-width:90px; display:inline-block; vertical-align:middle; width:90px;}
  .covbar>i{display:block; height:100%;}
  .covflag{font-size:10px; font-weight:800; padding:3px 9px; border-radius:999px; letter-spacing:.03em; text-transform:uppercase;}
  .covflag.under{background:rgba(214,48,48,.14); color:#c22;}
  .covflag.over{background:rgba(200,140,0,.16); color:#9a6a00;}
  .covflag.ok{background:rgba(94,186,40,.16); color:#3f8f1e;}
  .muted{color:var(--muted); font-size:13px;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none;}
  .toast.show{opacity:1;}
  .empty{padding:40px; text-align:center; color:var(--muted);}
  input[type=date]{padding:7px; border:1px solid var(--border); border-radius:6px; font-family:'Manrope';}
  .iconbtn{font-size:12px; padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; font-weight:600;}
  .iconbtn.approve{color:#3f8f1e; border-color:#b6e09a;}
  .iconbtn.changes{color:var(--red); border-color:#ffc9c2;}
  .segbar{display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0;}
  .segbar button{padding:6px 12px; border:none; background:#fff; font-family:inherit; font-weight:700; font-size:12px; color:var(--muted); cursor:pointer;}
  .segbar button+button{border-left:1px solid var(--border);}
  .segbar button.active{background:var(--ink); color:#fff;}
</style>
</head>
<body>

<div id="loginScreen" style="display:none">
  <div class="auth-card">
    <h2>Scheduling</h2>
    <p>Sign in with your CT Tools username and password.</p>
    <div id="loginError" class="auth-error" style="display:none"></div>
    <form onsubmit="event.preventDefault();signIn()">
      <label>Username</label>
      <input type="text" id="loginUser" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required>
      <label>Password</label>
      <input type="password" id="loginPass" autocomplete="current-password" required>
      <button type="submit" id="loginBtn" class="btn-auth">Sign In</button>
    </form>
  </div>
</div>

<div id="changePasswordScreen" style="display:none">
  <div class="auth-card">
    <h2>Set a new password</h2>
    <p>You're using a starter password. Pick a new one (at least 8 characters).</p>
    <div id="cpError" class="auth-error" style="display:none"></div>
    <form onsubmit="event.preventDefault();changePassword()">
      <label>New password</label>
      <input type="password" id="cpNew" autocomplete="new-password" minlength="8" required>
      <label>Confirm</label>
      <input type="password" id="cpConfirm" autocomplete="new-password" minlength="8" required>
      <button type="submit" id="cpBtn" class="btn-auth">Update Password</button>
    </form>
  </div>
</div>

<div id="appWrap" style="display:none">
  <header class="hdr">
    <div class="logo">T</div>
    <div class="htitle">Scheduling<small id="userLabel"></small></div>
    <button class="hbtn" onclick="signOut()">Sign out</button>
  </header>
  <div class="wrap">
    <div id="periodBanner" class="banner" style="display:none"></div>
    <div id="tabBar" class="tabs" style="display:none"></div>
    <div id="view"><div class="empty">Loading...</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const sb = window.sb;
const DOWS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DPW = DOWS.length;            // days collected per week (7: Mon-Sun)
const EXPORT_DAYS = 6;             // corporate Final Calendar is Mon-Sat only
const S = {
  me:null, period:null, shifts:[], shiftCodes:[],
  myEntries:{}, mySub:null,
  reps:[], allEntries:{}, subs:{},   // manager state
  tab:'mine', gridColor:'shift'      // Combined Grid cell coloring: 'shift' | 'sat'
};

// ---- date helpers (work_date is 'YYYY-MM-DD'; avoid UTC parsing) ----
function isoAdd(iso, n){ const [y,m,d]=iso.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return fmtISO(dt); }
function fmtISO(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function fmtMD(iso){ const [,m,d]=iso.split('-').map(Number); return m+'/'+d; }
function fmtMDY(iso){ const [y,m,d]=iso.split('-').map(Number); return m+'/'+d+'/'+y; }
function dayDate(period, week, dow){ return isoAdd(period.start_date, week*7 + dow); }
function isSundayISO(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d).getDay()===0; }
function dowName(iso){ const [y,m,d]=iso.split('-').map(Number); const g=new Date(y,m-1,d).getDay(); return DOWS[(g+6)%7].slice(0,3); }
const CC_TICKET_URL='https://helpdesk.trinitysolarsystems.com/support/catalog/items/67';

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

window.initApp = async function(profile, session){
  document.getElementById('userLabel').textContent = profile.name + (profile.kind==='manager'?' (Manager)':'');
  // load my people row + shift types + current open period
  const uid = session.user.id;
  const [meRes, shiftRes, perRes] = await Promise.all([
    sb.from('people').select('id,spd_slug,name,sf_name,role,division,sales_office').eq('auth_user_id', uid).maybeSingle(),
    sb.from('sched_shift_types').select('*').eq('active',true).order('sort'),
    sb.from('sched_periods').select('*').order('start_date',{ascending:false})
  ]);
  S.me = meRes.data;
  S.shifts = shiftRes.data || [];
  S.shiftCodes = S.shifts.map(s=>s.code);
  // Load ALL periods so a locked/sealed period stays viewable (read-only) and you
  // can pick a month to look back. Default to the open period, else the most
  // recently started (current), else the newest. Locking a period no longer
  // bricks the app -- non-open periods just render read-only (change requests only).
  const _today = new Date().toISOString().slice(0,10);
  S.periods = perRes.data || [];
  S.period = S.periods.find(p=>p.status==='open')
          || S.periods.find(p=>p.start_date <= _today)
          || S.periods[0] || null;

  renderBanner();
  if(!S.period){ document.getElementById('view').innerHTML='<div class="card empty">No scheduling periods yet. Create one in Export &amp; Period.</div>'; return; }

  const inRoster = S.me && S.me.sales_office; // only roster reps fill a grid
  if(window.IS_MANAGER){
    buildTabs(inRoster);
    if(inRoster){ S.tab='mine'; } else { S.tab='tracker'; }
    await switchTab(S.tab);
  } else {
    S.tab='mine';
    await loadMine(); renderMine();
  }
};

function renderBanner(){
  const b=document.getElementById('periodBanner');
  if(!S.period){ b.style.display='none'; return; }
  b.style.display='flex';
  let picker='';
  if((S.periods||[]).length>1){
    picker = `<select id="periodPick" aria-label="Choose a period to view"
      style="margin-left:auto;font:inherit;padding:4px 8px;border:1px solid var(--line,#d8ddd4);border-radius:6px;background:#fff;color:inherit;cursor:pointer">`
      + S.periods.map(p=>`<option value="${esc(p.id)}" ${p.id===S.period.id?'selected':''}>${esc(p.label||p.start_date)}${p.status!=='open'?' (locked)':''}</option>`).join('')
      + `</select>`;
  }
  b.innerHTML = `<b>${esc(S.period.label||'Current period')}</b>
    <span class="pill ${S.period.status}">${S.period.status}</span>
    <span class="muted">${S.period.num_weeks} weeks &middot; ${esc(S.period.region)}</span>${picker}`;
  const sel=document.getElementById('periodPick');
  if(sel) sel.onchange=()=>selectPeriod(sel.value);
}

// Switch the viewed period (look-back). Non-open periods render read-only via the
// existing status==='open' gates, so this is safe for any period.
async function selectPeriod(id){
  const p=(S.periods||[]).find(x=>x.id===id); if(!p || (S.period && p.id===S.period.id)) return;
  S.period=p; renderBanner();
  if(window.IS_MANAGER){ await switchTab(S.tab||'tracker'); }
  else { await loadMine(); renderMine(); }
}

// ===================== TABS (manager) =====================
function buildTabs(inRoster){
  const bar=document.getElementById('tabBar'); bar.style.display='flex';
  const tabs=[];
  if(inRoster) tabs.push(['mine','My Schedule']);
  tabs.push(['tracker','Ready to Submit'],['coverage','Coverage'],['rebalance','Rebalance'],['changes','Change Requests'],['combined','Combined Grid'],['repview','Rep View'],['export','Export & Period']);
  bar.innerHTML = tabs.map(([k,l])=>`<button class="tab ${k===S.tab?'active':''}" data-tab="${k}">${l}</button>`).join('');
  bar.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
}
async function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('#tabBar .tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  const v=document.getElementById('view'); v.innerHTML='<div class="empty">Loading...</div>';
  if(tab==='mine'){ await loadMine(); renderMine(); }
  else if(tab==='tracker'){ await loadManagerData(); renderTracker(); }
  else if(tab==='coverage'){ await loadManagerData(); renderCoverage(); }
  else if(tab==='rebalance'){ await loadManagerData(); await loadRebalanceData(); renderRebalance(); }
  else if(tab==='changes'){ await loadManagerData(); renderChangeRequests(); }
  else if(tab==='repview'){ await loadManagerData(); renderRepView(); }
  else if(tab==='combined'){ await loadManagerData(); renderCombined(); }
  else if(tab==='export'){ await loadManagerData(); renderExport(); }
}

// ===================== REP: MY SCHEDULE =====================
async function loadMine(){
  S.myEntries={}; S.mySub=null;
  if(!S.me) return;
  const [e,s,cr,ci]=await Promise.all([
    sb.from('sched_entries').select('work_date,shift_code').eq('period_id',S.period.id).eq('person_id',S.me.id),
    sb.from('sched_submissions').select('*').eq('period_id',S.period.id).eq('person_id',S.me.id).maybeSingle(),
    sb.from('sched_change_requests').select('*').eq('period_id',S.period.id).eq('person_id',S.me.id).order('created_at',{ascending:false}),
    sb.from('sched_change_items').select('*')
  ]);
  (e.data||[]).forEach(r=>S.myEntries[r.work_date]=r.shift_code);
  S.mySub=s.data;
  S.myRequests=cr.data||[];
  S.myReqItems={}; (ci.data||[]).forEach(it=>{ (S.myReqItems[it.request_id]=S.myReqItems[it.request_id]||[]).push(it); });
  S.myActions=[];
  try{ const {data}=await sb.from('action_items').select('*').eq('target_person_id',S.me.id)
    .in('status',['open']).order('priority').order('created_at'); S.myActions=data||[]; }catch(e3){}
  S.shiftStatus=null;
  try{ const {data}=await sb.rpc('sched_coverage_summary',{p_period_id:S.period.id}); S.shiftStatus=shiftStatusFromSummary(data); }catch(e2){}
  await loadSaturation();
}
function shiftOptions(sel, shiftStatus){
  return S.shifts.map(s=>{
    let suffix='';
    if(shiftStatus){ const r=codeRatio(s.code, shiftStatus); if(r!=null) suffix=' -- '+ratioLabel(r); }
    return `<option value="${esc(s.code)}" ${s.code===sel?'selected':''}>${esc(s.label)}${suffix}</option>`;
  }).join('');
}

// The rep availability grid (week cards + legend). Shared by the rep's own
// My Schedule view and the manager Rep View preview (disabled=true => read-only).
function repWeekCardsHTML(entries, disabled, shiftStatus, cellPid){
  // chips/dropdowns use the statewide shiftStatus (team gauge, kept); the grid
  // CELLS color by this rep's local-area saturation when available.
  const cellStatus = repCellMap(cellPid) || shiftStatus;
  let html='';
  if(shiftStatus){
    const chip=(s)=>{ const r=(shiftStatus[s]||{}).ratio; if(r==null) return '';
      return `<span class="cchip" style="background:${ratioTint(r)};color:${ratioColor(r)}">${SHIFT_META[s].name} &middot; ${ratioLabel(r)} &middot; ${Math.round(r*100)}% of target</span>`; };
    html+=`<div class="card" style="background:#f6f8f3"><b>Where the team needs coverage right now:</b>
      ${coverageLegendHTML()}
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${chip('S1')}${chip('S2')}${chip('S3')}</div>
      <div class="muted" style="margin-top:8px;font-size:12px">Cells and dropdown options below are tinted the same way -- greener shifts need coverage most. Sunday is collected for our weekly submission but is not on the corporate schedule.</div></div>`;
  }
  for(let w=0; w<S.period.num_weeks; w++){
    const mon=dayDate(S.period,w,0), end=dayDate(S.period,w,DPW-1);
    html+=`<div class="card"><div class="weekhd">Week ${w+1} &middot; ${fmtMD(mon)} - ${fmtMD(end)}</div><div class="daygrid">`;
    for(let d=0; d<DPW; d++){
      const iso=dayDate(S.period,w,d); const cur=entries[iso]||'Off All-Day';
      const off = cur==='Off All-Day';
      const sunday = (d===DPW-1);  // Sunday: collected, not part of coverage
      let style='';
      if(!sunday && !off){ const r=codeRatio(cur, cellStatus); if(r!=null) style=`style="border-left:4px solid ${ratioColor(r)};background:${ratioTint(r)}" title="${cellTitle(cur, r, cellPid)}"`; }
      html+=`<div class="day ${off?'off':''} ${sunday?'sunday':''}" ${style}><div class="dlabel">${DOWS[d].slice(0,3)} ${fmtMD(iso)}</div>
        <select data-date="${iso}" ${disabled?'disabled':''}>${shiftOptions(cur, sunday?null:shiftStatus)}</select></div>`;
    }
    html+=`</div></div>`;
  }
  html+=`<div class="card"><div class="weekhd">Shift times</div><div class="legend">`+
    S.shifts.filter(s=>s.weekday_start).map(s=>`<span><b>${esc(s.label)}:</b> ${s.weekday_start.slice(0,5)}-${s.weekday_end.slice(0,5)} (Sat ${s.saturday_start?s.saturday_start.slice(0,5)+'-'+s.saturday_end.slice(0,5):'n/a'})</span>`).join('')+
    `</div></div>`;
  return html;
}

// ===================== MANAGER: COVERAGE GAUGE =====================
const SHIFT_COVERS={S1:['All-Day','Shift 1','Shift 1&2','Shift 1&3'], S2:['All-Day','Shift 2','Shift 1&2','Shift 2&3'], S3:['All-Day','Shift 3','Shift 2&3','Shift 1&3']};
const SHIFT_META={S1:{name:'Shift 1',time:'10a-2p'}, S2:{name:'Shift 2',time:'1-5p'}, S3:{name:'Shift 3',time:'4-8p'}};
// which schedule shifts each day-code covers
const SHIFT_OF_CODE={'Shift 1':['S1'],'Shift 2':['S2'],'Shift 3':['S3'],'Shift 1&2':['S1','S2'],'Shift 2&3':['S2','S3'],'Shift 1&3':['S1','S3'],'All-Day':['S1','S2','S3'],'Off All-Day':[]};
// continuous coverage ratio = scheduled reps/day / target/day. <1 light, >1 saturated.
function covRatio(reps, target){ if(target>0) return reps/target; return reps>0?2:1; }
// piecewise so ratio 1.0 (on target) lands on yellow: 0.5->green(130), 1.0->yellow(55), 1.6->red(0)
function ratioHue(r){
  if(r<=1){ const t=Math.min(1,Math.max(0,(r-0.5)/0.5)); return Math.round(130-(130-55)*t); }
  const t=Math.min(1,(r-1)/0.6); return Math.round(55-55*t);
}
function ratioColor(r){ return `hsl(${ratioHue(r)},64%,34%)`; }
function ratioTint(r){ return `hsl(${ratioHue(r)},72%,93%)`; }
function ratioLabel(r){ if(r<0.9) return 'needed'; if(r<=1.1) return 'well covered'; return 'saturated'; }
// status map: { S1:{ratio,reps,target}, ... } from the summary RPC payload
function shiftStatusFromSummary(data){
  if(!data||!data.shifts) return null;
  const sup={},dem={}; ['S1','S2','S3'].forEach(s=>{ sup[s]=(data.shifts[s]||{}).supply_rep_days||0; dem[s]=(data.shifts[s]||{}).demand||0; });
  const rows=coverageRows(sup, data.n_days, dem, data.window_days, data.targets||{});
  const m={}; rows.forEach(r=>m[r.s]={ratio:covRatio(r.reps,r.target), reps:r.reps, target:r.target}); return m;
}
// average load of the shifts a day-code commits to (so All-Day blends all three);
// null for off/no-data. Mean gives a true per-cell saturation across the gradient.
function codeRatio(code, statusMap){
  if(!statusMap) return null;
  const sh=SHIFT_OF_CODE[code]||[]; if(!sh.length) return null;
  let sum=0, n=0; sh.forEach(s=>{ const r=statusMap[s]&&statusMap[s].ratio; if(r!=null){ sum+=r; n++; } });
  return n ? sum/n : null;
}
// Territory + Radius P3: per-rep geographic saturation. S.repCells[pid][shift] =
// {ratio, worst_town, worst_ratio} from sched_rep_cell_saturation -- a rep's grid
// cell colors by THEIR local-area saturation (drive-time reach), not the statewide
// shift average. codeRatio() blends it per day-code exactly as before.
function repCellMap(pid){ return (pid && S.repCells && S.repCells[pid]) || null; }
function cellWorst(pid, code){
  const m=repCellMap(pid); if(!m) return null;
  let wt=null, wr=null;
  (SHIFT_OF_CODE[code]||[]).forEach(s=>{ const c=m[s];
    if(c && c.worst_ratio!=null && (wr==null || c.worst_ratio<wr)){ wr=c.worst_ratio; wt=c.worst_town; } });
  return wt!=null ? {town:wt, ratio:wr} : null;
}
function cellTitle(code, r, pid){
  let t=`${esc(code)} &middot; ${ratioLabel(r)} (${Math.round(r*100)}% vs avg)`;
  const w=cellWorst(pid, code);
  if(w && w.ratio<0.9) t+=` &middot; nearest gap: ${esc(w.town)}`;
  return t;
}
// Load precomputed saturation for the selected period (RLS: managers see all rows,
// a rep sees only their own rep-cell rows; town saturation is manager-only).
async function loadSaturation(){
  S.repCells={}; S.townSat=[];
  if(!S.period) return;
  try{
    const {data}=await sb.from('sched_rep_cell_saturation')
      .select('person_id,shift,ratio,worst_town,worst_ratio').eq('period_id',S.period.id);
    (data||[]).forEach(r=>{ (S.repCells[r.person_id]=S.repCells[r.person_id]||{})[r.shift]=
      {ratio:r.ratio, worst_town:r.worst_town, worst_ratio:r.worst_ratio}; });
  }catch(e){}
  try{
    const {data}=await sb.from('sched_town_saturation')
      .select('town,shift,demand,ratio').eq('period_id',S.period.id);
    S.townSat=data||[];
  }catch(e){}
}

function coverageLegendHTML(){
  return `<div class="covleg">
    <div class="covleg-bar"></div>
    <div class="covleg-labels"><span>Needed</span><span>Well covered</span><span>Saturated</span></div>
    <div class="muted" style="font-size:11px;margin-top:5px">Color shows how a shift's scheduled coverage compares to expected appointment demand -- greener = lighter (good to take), redder = already saturated.</div>
  </div>`;
}
// Shared coverage math. supRepDays = rep-days available per shift; demand = appt counts.
// target/day = demand-proportional share of the reps you have scheduled (config-free).
function coverageRows(supRepDays, nDays, demand, wDays, targets){
  targets=targets||{};
  const reps={}, dem={};
  ['S1','S2','S3'].forEach(s=>{ reps[s]=(supRepDays[s]||0)/(nDays||1); dem[s]=demand[s]||0; });
  const totReps=reps.S1+reps.S2+reps.S3;
  const totDem=(dem.S1+dem.S2+dem.S3)||1;
  return ['S1','S2','S3'].map(s=>{
    const demShare=dem[s]/totDem, supShare=totReps>0?reps[s]/totReps:0;
    const demDay=dem[s]/(wDays||1), propTarget=demShare*totReps;
    const explicit=(targets[s]!=null)?Number(targets[s]):null;
    const target=explicit!=null?explicit:propTarget;
    const gap=reps[s]-target, load=reps[s]>0?demDay/reps[s]:null;
    let tag='ok',txt='aligned';
    if(target>0 || totReps>0){ if(gap<=-0.6){tag='under';txt='understaffed';} else if(gap>=0.6){tag='over';txt='overstaffed';} }
    return {s,dem:dem[s],demDay,demShare,reps:reps[s],supShare,target,propTarget,explicit,gap,load,tag,txt};
  });
}
// Rep-facing nudge: reps can't read team entries (RLS), so pull the aggregate via the
// SECURITY DEFINER summary RPC and surface a gentle banner when a shift is light.
async function repCoverageNudge(){
  if(!S.period || S.period.status!=='open') return;
  try{
    const {data}=await sb.rpc('sched_coverage_summary',{p_period_id:S.period.id});
    if(!data || !data.shifts) return;
    const sup={}, dem={};
    ['S1','S2','S3'].forEach(s=>{ sup[s]=(data.shifts[s]||{}).supply_rep_days||0; dem[s]=(data.shifts[s]||{}).demand||0; });
    const rows=coverageRows(sup, data.n_days, dem, data.window_days, data.targets||{});
    const under=rows.filter(r=>r.tag==='under').sort((a,b)=>a.gap-b.gap);
    if(!under.length) return;
    const names=under.map(u=>`${SHIFT_META[u.s].name} (${SHIFT_META[u.s].time})`).join(' and ');
    const view=document.getElementById('view'); if(!view) return;
    const banner=el(`<div class="card" style="border-left:4px solid var(--amber);background:#fffaf0"><b>Team coverage tip:</b> ${names} ${under.length>1?'are':'is'} light this period compared with where appointments land. If it works for your week, adding availability there helps the whole team book more.</div>`);
    view.insertBefore(banner, view.firstChild);
  }catch(e){ /* nudge is best-effort */ }
}
function renderCoverage(){
  const ndays=S.period.num_weeks*6;
  // live supply from submitted/draft entries (manager can read all)
  const supRaw={S1:0,S2:0,S3:0};
  for(const pid in S.allEntries){ const e=S.allEntries[pid];
    for(const d in e){ if(isSundayISO(d)) continue; const code=e[d]; for(const s of ['S1','S2','S3']) if(SHIFT_COVERS[s].includes(code)) supRaw[s]++; } }
  const haveDemand=Object.keys(S.demand||{}).length>0;
  const demand={}; ['S1','S2','S3'].forEach(s=>demand[s]=(S.demand[s]&&S.demand[s].appt_count)||0);
  const wdays=(S.demand.S1&&S.demand.S1.window_days)||1;
  const rows=coverageRows(supRaw, ndays, demand, wdays, S.targets);
  const submitted=S.reps.filter(r=>['submitted','approved'].includes((S.subs[r.id]||{}).status)).length;

  let html=`<div class="card"><div class="row" style="justify-content:space-between;align-items:flex-start">
      <div><div class="weekhd" style="border:0;margin:0;padding:0">Coverage &mdash; ${esc(S.period.label||'')}</div>
      <div class="muted" style="margin-top:4px">${submitted} of ${S.reps.length} schedules in. Capacity updates live as reps submit; compare it to where appointments actually land.</div></div>
      <span class="pill ${S.period.status}">${S.period.status}</span></div></div>`;

  if(!haveDemand){
    html+=`<div class="card"><div class="muted">No demand baseline yet. Run the Coverage Map builder (<code>coverage_builder.py</code>) to publish appointment demand, then this gauge fills in.</div></div>`;
  } else {
    html+=`<div class="card">${coverageLegendHTML()}</div>`;
    html+=`<div class="card"><table class="cov">
      <thead><tr><th>Shift</th><th>Demand / day</th><th>Demand mix</th><th>Reps / day</th><th>Capacity mix</th><th>Target / day</th><th>Gap</th><th>Appts / rep</th><th>Read</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td class="county">${SHIFT_META[r.s].name}<span class="muted" style="font-weight:400"> &middot; ${SHIFT_META[r.s].time}</span></td>
        <td class="mono">${r.demDay.toFixed(1)}<span class="muted" style="font-size:11px"> (${r.dem})</span></td>
        <td><div class="covbar"><i style="width:${Math.round(r.demShare*100)}%;background:var(--accent)"></i></div><span class="muted mono" style="font-size:11px">${Math.round(r.demShare*100)}%</span></td>
        <td class="mono">${r.reps.toFixed(1)}</td>
        <td><div class="covbar"><i style="width:${Math.round(r.supShare*100)}%;background:var(--green)"></i></div><span class="muted mono" style="font-size:11px">${Math.round(r.supShare*100)}%</span></td>
        <td><input type="number" min="0" step="0.5" class="tgtinput" data-shift="${r.s}" value="${r.explicit!=null?r.explicit:''}" placeholder="${r.propTarget.toFixed(1)}" title="${r.explicit!=null?'Manager-set target':'Auto (demand-proportional). Type to override.'}" style="width:52px;padding:4px;border:1px solid var(--border);border-radius:5px;font-size:12px;text-align:right;font-family:inherit"></td>
        <td class="mono" style="font-weight:700;color:${r.gap<=-0.3?'#c22':(r.gap>=0.3?'#9a6a00':'var(--muted)')}">${(r.gap>=0?'+':'')+r.gap.toFixed(1)}</td>
        <td class="mono">${r.load==null?'--':r.load.toFixed(2)}</td>
        <td><span class="covflag" style="background:${ratioTint(covRatio(r.reps,r.target))};color:${ratioColor(covRatio(r.reps,r.target))}">${ratioLabel(covRatio(r.reps,r.target))} &middot; ${Math.round(covRatio(r.reps,r.target)*100)}%</span></td></tr>`).join('')}</tbody></table>
      <div class="muted" style="margin-top:10px;font-size:12px">Demand = historical appointments by shift (${esc((S.demand.S1&&S.demand.S1.window_label)||'')}). Reps/day = reps scheduled to be available that shift on a typical day. <b>Target/day</b> is editable -- leave blank for an auto demand-proportional target, or type a number to set your own. <b>Gap</b> = reps/day minus target (negative = short); <b>Appts/rep</b> &gt; 1 means more demand than coverage.</div>
    </div>`;
    // quantitative headline
    const under=rows.filter(r=>r.tag==='under').sort((a,b)=>a.gap-b.gap)[0];
    const over=rows.filter(r=>r.tag==='over').sort((a,b)=>b.gap-a.gap)[0];
    if(under){
      const move=over?Math.max(1,Math.round(Math.min(Math.abs(under.gap),over.gap))):null;
      html+=`<div class="card" style="border-left:4px solid var(--red)"><b>Coverage gap:</b> ${SHIFT_META[under.s].name} (${SHIFT_META[under.s].time}) is short about <b>${Math.abs(under.gap).toFixed(1)} reps/day</b> (have ${under.reps.toFixed(1)}, target ${under.target.toFixed(1)})${over?`, while ${SHIFT_META[over.s].name} has about ${over.gap.toFixed(1)}/day to spare`:''}.${move?` Moving roughly ${move} rep${move>1?'s':''}/day from ${SHIFT_META[over.s].name} into ${SHIFT_META[under.s].name} would balance it.`:''}</div>`;
    }
    // per-county presence (Phase C)
    const counties=Object.keys(S.demandCounty||{});
    if(counties.length){
      const based={}; S.reps.forEach(r=>{ if(r.base_county) based[r.base_county]=(based[r.base_county]||0)+1; });
      const crows=counties.map(c=>{
        const dd=S.demandCounty[c], demDay=dd.appts/(dd.window_days||1), b=based[c]||0;
        const perBased=b>0?demDay/b:null;
        let tag='ok',txt='OK';
        if(b===0 && dd.appts>=20){tag='under';txt='No local';}
        else if(perBased!=null && perBased>5){tag='over';txt='Thin';}
        return {c,demDay,appts:dd.appts,b,perBased,tag,txt};
      }).sort((a,b)=>b.appts-a.appts);
      html+=`<div class="card"><div class="weekhd">By county &middot; demand vs reps based there</div>
        <div class="muted" style="margin-bottom:8px;font-size:12px">Reps based = home county (county-level, non-PII). Reps cover beyond where they live, so this is a local-presence read, not territory. The launcher Coverage Map has the full geographic picture (heat, drive times, who actually served each county).</div>
        <table class="cov"><thead><tr><th>County</th><th>Demand / day</th><th>Appts</th><th>Reps based</th><th>Demand per based rep</th><th>Read</th></tr></thead>
        <tbody>${crows.map(r=>`<tr><td class="county">${esc(r.c)}</td><td class="mono">${r.demDay.toFixed(1)}</td><td class="mono">${r.appts}</td><td class="mono">${r.b}</td><td class="mono">${r.perBased==null?'--':r.perBased.toFixed(1)}</td><td><span class="covflag ${r.tag}">${r.txt}</span></td></tr>`).join('')}</tbody></table></div>`;
    }
  }
  // Most-needed towns (Territory + Radius P3) -- the geographic gaps the statewide
  // shift gauge hides: each town's demand vs reps who can actually REACH it.
  if(S.townSat && S.townSat.length){
    const need=S.townSat.filter(t=>t.ratio!=null && t.demand>=3).sort((a,b)=>a.ratio-b.ratio).slice(0,12);
    if(need.length){
      html+=`<div class="card"><div class="weekhd">Most-needed towns &middot; where appointments outrun reachable coverage</div>
        <div class="muted" style="margin-bottom:8px;font-size:12px">Drive-time territory model: each town's appointment demand vs the reps who can reach it (home PIN + drive radius), normalized to the shift average. Greener = the real coverage gap to send a go-back into. Min 3 appts.</div>
        <table class="cov"><thead><tr><th>Town</th><th>Shift</th><th>Appts</th><th>Coverage vs avg</th></tr></thead>
        <tbody>${need.map(t=>`<tr><td class="county">${esc(t.town)}</td><td>${SHIFT_META[t.shift]?SHIFT_META[t.shift].name+' &middot; '+SHIFT_META[t.shift].time:esc(t.shift)}</td><td class="mono">${t.demand}</td>
          <td><span class="covflag" style="background:${ratioTint(t.ratio)};color:${ratioColor(t.ratio)}">${ratioLabel(t.ratio)} &middot; ${Math.round(t.ratio*100)}%</span></td></tr>`).join('')}</tbody></table></div>`;
    }
  }
  // Reach settings (Territory + Radius P4) -- editable per-rep drive radius (+ PIN status)
  if(S.reps && S.reps.length){
    html+=`<div class="card"><div class="weekhd">Reach settings &middot; per-rep drive radius</div>
      <div class="muted" style="margin-bottom:8px;font-size:12px">A rep's territory = towns within this drive-time radius of their home PIN. Default 90 min; smaller = tighter local territory. Changes apply on the next coverage refresh (weekly, or rebuild on demand).</div>
      <table class="cov"><thead><tr><th>Rep</th><th>Office</th><th>PIN</th><th>Radius (min)</th></tr></thead>
      <tbody>${S.reps.map(r=>`<tr>
        <td class="county">${esc(r.sf_name||r.name)}</td>
        <td class="muted">${esc(r.sales_office||'')}</td>
        <td>${r.home_lat!=null?`<span class="muted">set${r.base_county?' &middot; '+esc(r.base_county):''}</span>`:'<span style="color:#c22">no PIN</span>'}</td>
        <td><input type="number" min="10" max="240" step="5" class="radinput" data-id="${r.id}" value="${r.radius_min!=null?r.radius_min:90}" style="width:64px;padding:4px;border:1px solid var(--border);border-radius:5px;font-size:12px;text-align:right;font-family:inherit"></td>
      </tr>`).join('')}</tbody></table></div>`;
  }
  document.getElementById('view').innerHTML=html;
  // wire editable shift targets (managers)
  document.querySelectorAll('#view .tgtinput').forEach(inp=>{
    inp.onchange=async()=>{
      const shift=inp.dataset.shift, v=inp.value.trim();
      try{ await sb.rpc('sched_set_shift_target',{p_shift:shift, p_target: v===''?null:Number(v)});
        await loadManagerData(); renderCoverage(); toast('Target saved');
      }catch(err){ toast('Failed: '+(err.message||err)); }
    };
  });
  // wire editable per-rep reach radius (managers)
  document.querySelectorAll('#view .radinput').forEach(inp=>{
    inp.onchange=async()=>{
      const id=inp.dataset.id, v=parseInt(inp.value,10);
      if(!(v>=10 && v<=240)){ toast('Radius must be 10-240 min'); return; }
      try{ await sb.rpc('sched_set_rep_reach',{p_person_id:id, p_radius_min:v});
        toast('Saved -- applies on next coverage refresh');
      }catch(err){ toast('Failed: '+(err.message||err)); }
    };
  });
}

// ===================== MANAGER: REBALANCE COCKPIT =====================
// Day x shift calendar (deficit), ranked redeploys, and an exception checklist.
// Computed client-side from the saturation tables + reach matrix + day-of-week
// demand. The engine does the exhaustive scan; the views validate each call.
async function loadRebalanceData(){
  S.reach = {}; S.dow = {};
  try{
    // paginate: the reach matrix is ~2,700 rows and the API caps a page at 1000
    let off=0;
    while(true){
      const {data,error}=await sb.from('sched_reach_matrix').select('person_id,town,drive_min')
        .order('person_id').order('town').range(off, off+999);
      if(error || !data || !data.length) break;
      data.forEach(r=>{ (S.reach[r.person_id]=S.reach[r.person_id]||{})[r.town]=r.drive_min; });
      if(data.length<1000) break;
      off+=1000;
    }
  }catch(e){}
  // Forecast-first (recency-weighted, anticipates the weekday curve); fall back
  // to the flat day-of-week average if no forecast is published yet.
  try{
    const {data}=await sb.from('sched_demand_forecast').select('shift,dow,expected')
      .eq('region',S.period.region||'CT').eq('scope','state').gte('dow',0);
    (data||[]).forEach(r=>{ (S.dow[r.shift]=S.dow[r.shift]||{})[r.dow]=Number(r.expected); });
  }catch(e){}
  if(!Object.keys(S.dow).length){
    try{
      const {data}=await sb.from('sched_demand_dow').select('shift,dow,avg_appts')
        .eq('region',S.period.region||'CT').eq('scope','state');
      (data||[]).forEach(r=>{ (S.dow[r.shift]=S.dow[r.shift]||{})[r.dow]=Number(r.avg_appts); });
    }catch(e){}
  }
}
function renderRebalance(){
  const SH=['S1','S2','S3'], DOWL=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const radius={}; S.reps.forEach(r=>radius[r.id]=r.radius_min||90);
  const nameOf=pid=>(S.peopleById[pid]&&S.peopleById[pid].name)||pid;
  const supplyAt=(iso,s)=>{ let n=0; for(const pid in S.allEntries){ const c=S.allEntries[pid][iso]; if(c&&SHIFT_COVERS[s].includes(c)) n++; } return n; };
  // rate per shift so an average weekday lands near 1.0
  const tot={S1:[0,0],S2:[0,0],S3:[0,0]};
  for(let w=0;w<S.period.num_weeks;w++) for(let d=0;d<6;d++){ const iso=dayDate(S.period,w,d);
    for(const s of SH){ tot[s][0]+=supplyAt(iso,s); tot[s][1]+=((S.dow[s]||{})[d]||0); } }
  const rate={}; SH.forEach(s=>rate[s]=tot[s][1]>0?tot[s][0]/tot[s][1]:0);
  const cellAt=(iso,s,d)=>{ const sup=supplyAt(iso,s), t=((S.dow[s]||{})[d]||0)*rate[s];
    return {ratio:t>0?sup/t:null, gap:sup-t, sup, t}; };

  // ---- ranked redeploys ----
  const repOver={};
  for(const pid in S.repCells){ let mx=null,ms=null; for(const s of SH){ const v=(S.repCells[pid][s]||{}).ratio; if(v!=null&&(mx==null||v>mx)){mx=v;ms=s;} } if(mx!=null&&mx>1.1) repOver[pid]={ratio:mx,shift:ms}; }
  const targets=(S.townSat||[]).filter(t=>t.ratio!=null&&t.ratio<0.9&&t.demand>=5)
    .sort((a,b)=>((1-b.ratio)*b.demand)-((1-a.ratio)*a.demand));
  const used={}, moves=[];
  for(const t of targets){
    let best=null;
    for(const pid in repOver){ if(used[pid]) continue; const dm=(S.reach[pid]||{})[t.town]; if(dm==null||dm>radius[pid]) continue; if(best==null||dm<best.dm) best={pid,dm}; }
    if(!best) continue; used[best.pid]=1;
    const rp=S.reach[best.pid]||{}; let home='?',hm=1e9; for(const tn in rp){ if(rp[tn]<hm){hm=rp[tn];home=tn;} }
    moves.push({pid:best.pid,rep:nameOf(best.pid),home,over:'Shift '+repOver[best.pid].shift[1],to:t.town+' (Shift '+t.shift[1]+')',toTown:t.town,toShift:t.shift,appts:t.demand,drive:Math.round(best.dm)+'m'});
    if(moves.length>=12) break;
  }
  // Manager forwards a redeploy to a rep as an offer the rep approves (manager-hub routing).
  window.sendOffer=async(pid,town,sh)=>{
    const sn=(SHIFT_META[sh]?SHIFT_META[sh].name:sh);
    try{ await sb.rpc('action_create',{p_target:pid,p_kind:'redeploy',p_title:'Coverage offer: '+town,
        p_detail:'Your area is well covered; '+town+' is short on '+sn+'. Can you take coverage there?',
        p_priority:1,p_source:'cockpit',p_period_id:S.period.id});
      toast('Offer sent to '+((S.peopleById[pid]||{}).name||'rep'));
    }catch(e){ toast('Failed: '+(e.message||e)); }
  };
  let ml=`<div class="card"><div class="weekhd">Top redeploys</div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">Each row sends an over-stacked rep where coverage is short, nearest first. The drive is from their home base. Send it to the rep as an offer; they approve or decline on their own page.</div>
    <table class="cov"><thead><tr><th>Move this rep</th><th>Home base</th><th>Over on</th><th>Send to</th><th>Appts</th><th>Drive</th><th></th></tr></thead><tbody>
    ${moves.length?moves.map(m=>`<tr><td class="county">${esc(m.rep)}</td><td>${esc(m.home)}</td><td>${m.over}</td><td>${esc(m.to)}</td><td class="mono">${m.appts}</td><td class="mono">${m.drive}</td><td><button class="btn btn-ghost" style="padding:3px 9px;font-size:11px" onclick="sendOffer('${m.pid}','${esc(m.toTown)}','${m.toShift}')">Send to rep</button></td></tr>`).join(''):'<tr><td colspan="7" class="muted">No high-value redeploys found. Coverage is balanced, or the saturation build has not run for this period.</td></tr>'}
    </tbody></table></div>`;

  // ---- exception checklist ----
  const thin=(S.townSat||[]).filter(t=>t.ratio!=null&&t.demand>=5&&t.ratio<0.25).sort((a,b)=>a.ratio-b.ratio);
  const shortDays=[]; for(let w=0;w<S.period.num_weeks;w++) for(let d=0;d<6;d++){ const iso=dayDate(S.period,w,d); for(const s of SH){ const c=cellAt(iso,s,d); if(c.gap<=-3) shortDays.push({iso,s,gap:Math.round(c.gap)}); } }
  shortDays.sort((a,b)=>a.gap-b.gap);
  const allWeek=[]; for(const pid in S.repCells){ let allover=true; for(const s of SH){ const v=(S.repCells[pid][s]||{}).ratio; if(v==null||v<=1.1){allover=false;break;} } if(allover) allWeek.push(nameOf(pid)); }
  const line=(n,label,extra)=>`<div style="margin-top:6px;display:flex;gap:8px"><b style="color:${n?'#c52':'#2a8'};min-width:28px">${n}</b><div>${label}${n&&extra?': <span class="muted">'+extra+'</span>':''}</div></div>`;
  const ex=`<div class="card"><div class="weekhd">Exception checklist</div>
    <div class="muted" style="font-size:12px;margin-bottom:4px">Hard flags to clear to zero. Nothing here hides in the grid.</div>
    ${line(thin.length,'town-shifts with demand and almost no reachable coverage', thin.slice(0,8).map(t=>esc(t.town)+' '+t.shift).join(', '))}
    ${line(shortDays.length,'day-shifts short by 3+ reps', shortDays.slice(0,6).map(x=>dowName(x.iso)+' '+fmtMD(x.iso)+' '+x.s+' ('+x.gap+')').join(', '))}
    ${line(allWeek.length,'reps saturated on every shift (redeploy all week)', allWeek.map(esc).join(', '))}
  </div>`;

  // ---- calendar deficit grid with what-if simulator ----
  S.wf={from:null, moves:[], delta:{}};
  const eff=(iso,s)=> supplyAt(iso,s) + (S.wf.delta[s+'|'+iso]||0);
  const cellSim=(iso,s,d)=>{ const sup=eff(iso,s), t=((S.dow[s]||{})[d]||0)*rate[s]; return {ratio:t>0?sup/t:null, gap:sup-t, sup, t}; };
  const calCard=`<div class="card"><div class="weekhd">Coverage by day and shift</div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">Each cell is the gap for that day and shift. <b style="color:#2a8">Green = short</b> (add reps), <b style="color:#c52">red = over</b> (free reps). Expected demand is the average for that weekday; Sunday is off-schedule and omitted. <b>Click a red cell, then a green cell, to simulate moving a rep and watch both rebalance.</b></div>
    <div id="wfsim" style="margin-bottom:8px"></div><div id="wfcal"></div></div>`;
  document.getElementById('view').innerHTML = ml + ex + calCard;
  window.wfReset=()=>{ S.wf={from:null,moves:[],delta:{}}; drawCal(); };
  window.wfClick=(iso,s)=>{ const k=s+'|'+iso;
    if(!S.wf.from){ S.wf.from={iso,s,k}; }
    else if(S.wf.from.k===k){ S.wf.from=null; }
    else{ if(eff(S.wf.from.iso,S.wf.from.s)>0){ S.wf.delta[S.wf.from.k]=(S.wf.delta[S.wf.from.k]||0)-1; S.wf.delta[k]=(S.wf.delta[k]||0)+1; S.wf.moves.push({f:S.wf.from,t:{iso,s}}); } S.wf.from=null; }
    drawCal();
  };
  function drawCal(){
   try{
    const sim=document.getElementById('wfsim');
    if(sim){ const n=S.wf.moves.length;
      const msg=S.wf.from ? ('Source picked: '+dowName(S.wf.from.iso)+' '+fmtMD(S.wf.from.iso)+' '+S.wf.from.s+'. Now click a green (short) cell.')
                          : 'Click a red (over) cell, then a green (short) cell, to simulate a move.';
      sim.innerHTML=`<div class="row" style="gap:10px;align-items:center;flex-wrap:wrap"><span class="muted" style="font-size:12px">${msg}</span>`
        +(n?` <button class="btn btn-ghost" onclick="wfReset()">Reset (${n} move${n>1?'s':''})</button>`:'')
        +(n?` <span class="muted" style="font-size:12px">Simulated: `+S.wf.moves.map(m=>dowName(m.f.iso)+' '+fmtMD(m.f.iso)+' '+m.f.s+' &rarr; '+dowName(m.t.iso)+' '+fmtMD(m.t.iso)+' '+m.t.s).join(' &middot; ')+`</span>`:'')
        +`</div>`;
    }
    const host=document.getElementById('wfcal'); if(!host) return;
    let cal=`<div style="display:flex;gap:18px;flex-wrap:wrap">`;
    for(const s of SH){
      cal+=`<div style="flex:1;min-width:300px"><div style="font-weight:700;margin-bottom:4px">${SHIFT_META[s].name} <span class="muted" style="font-weight:400;font-size:12px">${SHIFT_META[s].time}</span></div>
        <table style="border-collapse:separate;border-spacing:3px;width:100%"><thead><tr><th></th>${DOWL.map(x=>`<th class="muted" style="font-size:11px;font-weight:600">${x}</th>`).join('')}</tr></thead><tbody>`;
      for(let w=0;w<S.period.num_weeks;w++){
        cal+=`<tr><td class="muted" style="font-size:10px">W${w+1}</td>`;
        for(let d=0;d<6;d++){ const iso=dayDate(S.period,w,d); const c=cellSim(iso,s,d); const r=c.ratio, g=Math.round(c.gap);
          const sel=S.wf.from&&S.wf.from.k===(s+'|'+iso);
          cal+=`<td onclick="wfClick('${iso}','${s}')" title="${dowName(iso)} ${fmtMD(iso)} ${SHIFT_META[s].name}: ${c.sup} scheduled, expected ${c.t.toFixed(1)}" style="cursor:pointer;background:${r==null?'#eee':ratioTint(r)};border:${sel?'2px solid #1A2332':'1px solid '+(r==null?'#ddd':ratioColor(r))};border-radius:5px;text-align:center;padding:5px 2px;min-width:32px">
            <div style="font-weight:700;font-size:12px;color:${r==null?'#999':ratioColor(r)}">${g>=0?'+':''}${g}</div></td>`;
        }
        cal+=`</tr>`;
      }
      cal+=`</tbody></table></div>`;
    }
    cal+=`</div>`; host.innerHTML=cal;
   }catch(e){ const h=document.getElementById('wfcal'); if(h) h.innerHTML='<div class="muted">Calendar unavailable.</div>'; }
  }
  drawCal();
}

// ===================== MANAGER: REP VIEW (preview) =====================
function renderRepView(){
  if(!S.reps.length){ document.getElementById('view').innerHTML='<div class="card empty">No reps in scope.</div>'; return; }
  const opts=S.reps.map(r=>`<option value="${r.id}">${esc(r.sf_name||r.name)} -- ${esc(r.sales_office||'')} (${((S.subs[r.id]||{}).status||'not started').replace('_',' ')})</option>`).join('');
  document.getElementById('view').innerHTML=`<div class="card"><div class="row" style="gap:10px;align-items:center">
      <label class="muted" style="font-weight:600">Preview a rep's view:</label>
      <select id="repPick" style="padding:8px;border:1px solid var(--border);border-radius:8px;font-family:'Manrope';min-width:300px;font-size:14px">${opts}</select>
    </div>
    <div class="muted" style="margin-top:6px;font-size:12px">Read-only preview of exactly what the rep sees on their My Schedule tab when they enter availability.</div></div>
    <div id="repPreview"></div>`;
  const draw=()=>{
    const id=document.getElementById('repPick').value, rep=S.reps.find(r=>r.id===id)||{};
    const ent=S.allEntries[id]||{}, sub=S.subs[id]||{}, status=sub.status||'not_started';
    let h=`<div class="card"><div class="row" style="justify-content:space-between">
        <div class="row"><span class="pill ${status}">${status.replace('_',' ')}</span>
        <span class="muted">${esc(rep.sf_name||rep.name)} &middot; ${esc(rep.sales_office||'')}${rep.base_county?' &middot; lives in '+esc(rep.base_county):''}</span></div>
        ${sub.submitted_at?`<span class="muted">submitted ${new Date(sub.submitted_at).toLocaleDateString()}</span>`:''}</div></div>`;
    if(status==='changes_requested' && sub.note){ h+=`<div class="card"><div class="note"><b>Changes requested:</b> ${esc(sub.note)}</div></div>`; }
    h+=repWeekCardsHTML(ent, true, S.shiftStatus, id);
    document.getElementById('repPreview').innerHTML=h;
  };
  document.getElementById('repPick').onchange=draw; draw();
}

// ===================== MANAGER: CHANGE REQUESTS =====================
function shiftFromCode(code){ const sh=SHIFT_OF_CODE[code]||[]; return sh[0]||'S1'; }
function updateChangesBadge(){
  const n=(S.changeRequests||[]).filter(r=>r.status==='open').length;
  const btn=document.querySelector('#tabBar .tab[data-tab="changes"]');
  if(btn) btn.innerHTML='Change Requests'+(n?` <span class="tabbadge">${n}</span>`:'');
}
function renderChangeRequests(){
  const reqs=[...(S.changeRequests||[])].sort((a,b)=>(a.status==='open'?0:1)-(b.status==='open'?0:1));
  const open=reqs.filter(r=>r.status==='open').length;
  let html=`<div class="card"><div class="row" style="justify-content:space-between;align-items:flex-start">
      <div><div class="weekhd" style="border:0;margin:0;padding:0">Change Requests</div>
      <div class="muted" style="margin-top:4px">${open} open. Reps request shift changes after the schedule is published. Approving applies the change here, then file the corporate ticket and record its number.</div></div>
      <a href="${CC_TICKET_URL}" target="_blank" rel="noopener" class="btn btn-ghost" style="text-decoration:none;white-space:nowrap">CC Ticket portal &rarr;</a></div></div>`;
  if(!reqs.length){ html+=`<div class="card empty">No change requests yet.</div>`; document.getElementById('view').innerHTML=html; return; }
  reqs.forEach(r=>{
    const items=S.changeItems[r.id]||[]; const rep=S.peopleById[r.person_id]||{name:'Rep'};
    const accent=r.status==='open'?'var(--amber)':(r.status==='approved'?'var(--green)':'var(--red)');
    const pill=r.status==='open'?'submitted':(r.status==='approved'?'approved':'changes_requested');
    html+=`<div class="card" style="border-left:4px solid ${accent}">
      <div class="row" style="justify-content:space-between">
        <div><b>${esc(rep.name)}</b> <span class="muted">${esc(rep.office||'')}</span></div>
        <span class="pill ${pill}">${r.status}${r.cc_ticket_number?' &middot; '+esc(r.cc_ticket_number):''}</span></div>
      ${r.reason?`<div class="muted" style="margin:6px 0">"${esc(r.reason)}"</div>`:''}
      <table class="tracker" style="margin-top:6px"><thead><tr><th>Day</th><th>Change</th><th>From</th><th>To</th><th></th></tr></thead><tbody>
      ${items.map(it=>`<tr>
        <td>${dowName(it.work_date)} ${fmtMD(it.work_date)}</td><td>${esc(it.change_type)}</td>
        <td class="muted">${esc(it.from_code||'--')}</td><td><b>${esc(it.to_code||'--')}</b></td>
        <td>${it.change_type==='remove'?`<button class="iconbtn" data-cover="${r.person_id}|${it.work_date}|${shiftFromCode(it.from_code)}">Who can cover?</button>`:''}</td>
      </tr>`).join('')}</tbody></table>
      <div class="cover-out muted" style="margin-top:6px;font-size:12px"></div>
      ${r.decision_note?`<div class="muted" style="margin-top:6px">Manager note: ${esc(r.decision_note)}</div>`:''}
      ${r.status==='open'?`<div class="actionbar" style="margin-top:8px">
        <button class="iconbtn approve" data-approve="${r.id}">Approve + ticket</button>
        <button class="iconbtn changes" data-deny="${r.id}">Deny</button></div>`:''}
      ${r.status==='approved'&&!r.cc_ticket_number?`<div class="actionbar" style="margin-top:8px"><button class="iconbtn" data-ticket="${r.id}">Add CC ticket #</button></div>`:''}
    </div>`;
  });
  document.getElementById('view').innerHTML=html;
  document.querySelectorAll('#view [data-approve]').forEach(b=>b.onclick=()=>crApprove(b.dataset.approve));
  document.querySelectorAll('#view [data-deny]').forEach(b=>b.onclick=()=>crDeny(b.dataset.deny));
  document.querySelectorAll('#view [data-ticket]').forEach(b=>b.onclick=()=>crTicket(b.dataset.ticket));
  document.querySelectorAll('#view [data-cover]').forEach(b=>b.onclick=()=>crCover(b));
}
async function crApprove(id){
  const t=prompt('CC ticket number (file it at the CC Ticket portal first, then paste the number here):');
  if(t===null) return;
  const note=prompt('Optional note to the rep:')||null;
  try{ await sb.rpc('sched_review_change_request',{p_request_id:id,p_action:'approve',p_note:note,p_ticket:t||null});
    toast('Approved'); await loadManagerData(); renderChangeRequests();
  }catch(err){ toast('Failed: '+(err.message||err)); }
}
async function crDeny(id){
  const note=prompt('Reason for denial (shown to the rep):'); if(note===null) return;
  try{ await sb.rpc('sched_review_change_request',{p_request_id:id,p_action:'deny',p_note:note,p_ticket:null});
    toast('Denied'); await loadManagerData(); renderChangeRequests();
  }catch(err){ toast('Failed: '+(err.message||err)); }
}
async function crTicket(id){
  const t=prompt('CC ticket number:'); if(!t) return;
  try{ await sb.rpc('sched_set_ticket_number',{p_request_id:id,p_ticket:t}); toast('Saved'); await loadManagerData(); renderChangeRequests(); }
  catch(err){ toast('Failed: '+(err.message||err)); }
}
async function crCover(btn){
  const [pid,date,shift]=btn.dataset.cover.split('|');
  const out=btn.closest('.card').querySelector('.cover-out'); out.textContent='Checking...';
  try{ const {data}=await sb.rpc('sched_coverage_candidates',{p_period_id:S.period.id,p_work_date:date,p_shift:shift,p_for_person:pid});
    const list=data||[];
    out.innerHTML=list.length?`<b>Could cover ${SHIFT_META[shift].name} ${fmtMD(date)}:</b> ${list.map(c=>esc(c.name)+(c.rank!=null?' (R'+Math.round(c.rank)+')':'')).join(', ')}`:`No same-territory teammates are free for ${SHIFT_META[shift].name} that day.`;
  }catch(err){ out.textContent='Lookup failed: '+(err.message||err); }
}

// ===================== MANAGER: TRACKER =====================
function renderTracker(){
  let offices=[...new Set(S.reps.map(r=>r.sales_office))];
  const done=S.reps.filter(r=>['submitted','approved'].includes((S.subs[r.id]||{}).status)).length;
  let html=`<div class="card"><div class="row" style="justify-content:space-between">
    <div><b>${done} of ${S.reps.length}</b> <span class="muted">submitted or approved</span></div>
    <select id="offFilter" class="iconbtn"><option value="">All offices</option>${offices.map(o=>`<option>${esc(o)}</option>`).join('')}</select>
    </div></div>`;
  html+=`<div class="card"><table class="tracker"><thead><tr>
    <th>Rep</th><th>Office</th><th>Status</th><th>Submitted</th><th>Actions</th></tr></thead><tbody id="trackBody"></tbody></table></div>`;
  document.getElementById('view').innerHTML=html;
  const draw=()=>{
    const f=document.getElementById('offFilter').value;
    const rows=S.reps.filter(r=>!f||r.sales_office===f);
    document.getElementById('trackBody').innerHTML=rows.map(r=>{
      const sub=S.subs[r.id]||{}; const st=sub.status||'not_started';
      const when=sub.submitted_at?new Date(sub.submitted_at).toLocaleDateString():'';
      let actions='';
      if(st==='submitted'){ actions=`<button class="iconbtn approve" data-act="approve" data-id="${r.id}">Approve</button> <button class="iconbtn changes" data-act="changes" data-id="${r.id}">Request changes</button>`; }
      else if(st==='approved'){ actions=`<button class="iconbtn" data-act="reopen" data-id="${r.id}">Reopen</button>`; }
      return `<tr><td>${esc(r.sf_name||r.name)}</td><td>${esc(r.sales_office)}</td>
        <td><span class="pill ${st}">${st.replace('_',' ')}</span></td><td>${when}</td><td>${actions}</td></tr>`;
    }).join('') || `<tr><td colspan="5" class="muted">No reps.</td></tr>`;
    document.querySelectorAll('#trackBody .iconbtn').forEach(b=>b.onclick=()=>trackerAction(b.dataset.id,b.dataset.act));
  };
  document.getElementById('offFilter').onchange=draw; draw();
}
async function trackerAction(personId, act){
  try{
    if(act==='approve'){ await sb.rpc('sched_review',{p_period_id:S.period.id,p_person_id:personId,p_action:'approve',p_note:null}); }
    else if(act==='reopen'){ await sb.rpc('sched_review',{p_period_id:S.period.id,p_person_id:personId,p_action:'request_changes',p_note:'Reopened by manager'}); }
    else if(act==='changes'){ const note=prompt('What changes are needed?'); if(note===null) return; await sb.rpc('sched_review',{p_period_id:S.period.id,p_person_id:personId,p_action:'request_changes',p_note:note}); }
    toast('Updated'); await loadManagerData(); renderTracker();
  }catch(err){ toast('Failed: '+(err.message||err)); }
}

// ===================== MANAGER: COMBINED GRID =====================
const CODEMAP={
  'Off All-Day':{t:'&middot;',c:'c-off'}, 'All-Day':{t:'AD',c:'c-ad'},
  'Shift 1':{t:'1',c:'c-s1'}, 'Shift 2':{t:'2',c:'c-s2'}, 'Shift 3':{t:'3',c:'c-s3'},
  'Shift 1&2':{t:'1&middot;2',c:'c-combo'}, 'Shift 2&3':{t:'2&middot;3',c:'c-combo'}, 'Shift 1&3':{t:'1&middot;3',c:'c-combo'}
};
function cellHTML(id,iso,code){ const m=CODEMAP[code]||CODEMAP['Off All-Day'];
  // Saturation mode: tint each cell by how that shift compares to demand (same scale as
  // the Rep View / Coverage tab). Off-days, Sundays, and no-baseline fall back to shift color.
  if(S.gridColor==='sat'){
    const cs = repCellMap(id) || S.shiftStatus;
    const r = (cs && code!=='Off All-Day' && !isSundayISO(iso)) ? codeRatio(code, cs) : null;
    if(r!=null) return `<span class="cell" style="background:${ratioTint(r)};color:${ratioColor(r)}" data-id="${id}" data-date="${iso}" data-code="${esc(code)}" title="${cellTitle(code, r, id)}">${m.t}</span>`;
  }
  return `<span class="cell ${m.c}" data-id="${id}" data-date="${iso}" data-code="${esc(code)}" title="${esc(code)}">${m.t}</span>`; }
function renderCombined(){
  const editable = S.period.status==='open';
  let head1='<th class="rep">Rep</th>', head2='<th class="rep"></th>';
  for(let w=0; w<S.period.num_weeks; w++){
    head1+=`<th class="wk" colspan="${DPW}">Wk ${w+1} &middot; ${fmtMD(dayDate(S.period,w,0))}</th>`;
    for(let d=0; d<DPW; d++) head2+=`<th class="${d===0?'wkstart':''}">${DOWS[d].slice(0,2)}</th>`;
  }
  let body='';
  for(const r of S.reps){
    const ent=S.allEntries[r.id]||{};
    let tds=`<td class="rep" title="${esc(r.sf_name||r.name)}">${esc(r.sf_name||r.name)}</td>`;
    for(let w=0; w<S.period.num_weeks; w++){
      for(let d=0; d<DPW; d++){
        const iso=dayDate(S.period,w,d); const code=ent[iso]||'Off All-Day';
        tds+=`<td class="${d===0?'wkstart':''}">${cellHTML(r.id,iso,code)}</td>`;
      }
    }
    body+=`<tr>${tds}</tr>`;
  }
  const mode=S.gridColor||'shift';
  const shiftLegend=Object.entries(CODEMAP).map(([code,m])=>`<span class="${m.c}">${m.t} ${esc(code.replace('Off All-Day','Off').replace('All-Day','All day'))}</span>`).join('');
  const legend = mode==='sat'
    ? (S.shiftStatus ? coverageLegendHTML()
        : `<div class="muted" style="font-size:12px;margin-top:10px">No demand baseline yet, so there is nothing to scale coverage color against. Run <code>coverage_builder.py</code> to publish appointment demand, then this view fills in.</div>`)
    : `<div class="clegend">${shiftLegend}</div>`;
  document.getElementById('view').innerHTML=`<div class="card combined fullbleed">
    <div class="row" style="justify-content:space-between;margin-bottom:8px;align-items:center;gap:12px">
      <div class="muted">${editable?'Click any cell to change it. Saves immediately.':'Period is locked (read-only).'} ${S.reps.length} reps.</div>
      <div class="segbar" title="Color cells by shift type, or by how each shift compares to appointment demand (same scale as Rep View and Coverage)">
        <button data-mode="shift" class="${mode==='shift'?'active':''}">Shift color</button>
        <button data-mode="sat" class="${mode==='sat'?'active':''}">Saturation color</button>
      </div>
    </div>
    <div style="overflow-x:auto"><table class="cgrid"><thead><tr>${head1}</tr><tr>${head2}</tr></thead><tbody>${body}</tbody></table></div>
    ${legend}</div>`;
  if(editable){
    document.querySelector('#view .cgrid tbody').addEventListener('click', e=>{
      const cell=e.target.closest('.cell'); if(!cell) return; openCellEditor(cell);
    });
  }
  document.querySelectorAll('#view .segbar button').forEach(b=>b.onclick=()=>{ S.gridColor=b.dataset.mode; renderCombined(); });
}
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function openCellEditor(cell){
  const id=cell.dataset.id, iso=cell.dataset.date, code=cell.dataset.code;
  const sel=document.createElement('select'); sel.className='cellsel'; sel.innerHTML=shiftOptions(code);
  let settled=false;
  const swapBack=(c)=>{ if(settled) return; settled=true; const span=el(cellHTML(id,iso,c)); sel.replaceWith(span); };
  cell.replaceWith(sel); sel.focus();
  sel.onchange=async()=>{ const nc=sel.value;
    try{ await sb.rpc('sched_manager_set_entries',{p_period_id:S.period.id,p_person_id:id,p_entries:[{work_date:iso,shift_code:nc}]});
      (S.allEntries[id]=S.allEntries[id]||{})[iso]=nc; toast('Saved'); swapBack(nc);
    }catch(err){ toast('Failed: '+(err.message||err)); swapBack(code); } };
  sel.onblur=()=>swapBack(code);
}

// ===================== MANAGER: EXPORT & PERIOD =====================
function renderExport(){
  let html=`<div class="card"><div class="weekhd">Export for Salesforce + Skedulo</div>
    <p class="muted">Downloads an .xlsx in the Final Sales Calendar layout. Avail_Hours and Go_Back are left blank -- corporate computes those by rank and availability.</p>
    <div class="actionbar"><button class="btn btn-primary" id="dlBtn">Download .xlsx</button></div></div>`;
  html+=`<div class="card"><div class="weekhd">Period</div>
    <div class="row"><span class="pill ${S.period.status}">${S.period.status}</span>
    <span>${esc(S.period.label)}</span>
    <button class="btn btn-ghost" id="lockBtn">${S.period.status==='open'?'Lock period':'Unlock period'}</button></div></div>`;
  html+=`<div class="card"><div class="weekhd">Open a new period</div>
    <div class="row"><label class="muted">First Monday:</label><input type="date" id="newStart">
    <button class="btn btn-ghost" id="createBtn">Create 4-week period</button></div></div>`;
  document.getElementById('view').innerHTML=html;
  document.getElementById('dlBtn').onclick=exportXlsx;
  document.getElementById('lockBtn').onclick=async()=>{
    try{ await sb.rpc('sched_lock_period',{p_period_id:S.period.id, p_unlock:S.period.status!=='open'});
      const {data}=await sb.from('sched_periods').select('*').eq('id',S.period.id).maybeSingle(); S.period=data;
      S.periods=(S.periods||[]).map(x=>x.id===data.id?data:x);
      renderBanner(); renderExport(); toast('Updated');
    }catch(err){ toast('Failed: '+(err.message||err)); }
  };
  document.getElementById('createBtn').onclick=async()=>{
    const v=document.getElementById('newStart').value; if(!v){ toast('Pick a Monday'); return; }
    try{ const {data}=await sb.rpc('sched_create_period',{p_start_date:v}); toast('Period created');
      const {data:p}=await sb.from('sched_periods').select('*').eq('id',data).maybeSingle(); S.period=p;
      S.periods=[p, ...(S.periods||[]).filter(x=>x.id!==p.id)].sort((a,b)=>(a.start_date<b.start_date?1:-1));
      renderBanner(); await switchTab('export');
    }catch(err){ toast('Failed: '+(err.message||err)); }
  };
}
async function exportXlsx(){
  let rows;
  try{ const {data,error}=await sb.rpc('sched_get_export',{p_period_id:S.period.id}); if(error) throw error; rows=data||[]; }
  catch(err){ toast('Export failed: '+(err.message||err)); return; }
  const W=S.period.num_weeks;
  // row1: week bands; row2: headers
  const r1=['Sales Rep Details','',''];
  const r2=['Division','Sales Office','Sales Representative Name'];
  for(let w=0; w<W; w++){
    const mon=dayDate(S.period,w,0);
    r1.push('Week '+(w+1)+' - '+fmtMDY(mon)); for(let i=0;i<7;i++) r1.push('');
    DOWS.forEach(dn=>r2.push('Wk_'+(w+1)+'_'+dn));
    r2.push('Wk_'+(w+1)+'_Avail_Hours','Wk_'+(w+1)+'_Go_Back');
  }
  const aoa=[r1,r2];
  rows.forEach(rec=>{
    const cells=rec.cells||[]; const line=[rec.division||'',rec.office||'',rec.name||''];
    for(let w=0; w<W; w++){ for(let d=0; d<6; d++) line.push(cells[w*6+d]||'Off All-Day'); line.push('',''); }
    aoa.push(line);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  // merges: A1:C1 + each week band (8 cols)
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:2}}];
  for(let w=0; w<W; w++){ const c=3+w*8; ws['!merges'].push({s:{r:0,c},e:{r:0,c:c+7}}); }
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Sales Schedule');
  XLSX.writeFile(wb, 'CT Sales Calendar - '+S.period.start_date+'.xlsx');
  toast('Downloaded');
}
