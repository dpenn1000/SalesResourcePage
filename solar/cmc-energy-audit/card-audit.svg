<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" role="img" aria-label="CMC Energy Audit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143150"/>
      <stop offset="0.55" stop-color="#16335a"/>
      <stop offset="1" stop-color="#0E5A50"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.86" cy="0.08" r="0.65">
      <stop offset="0" stop-color="#78C832" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#78C832" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <rect width="400" height="220" fill="url(#glow)"/>

  <!-- House -->
  <g fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.92">
    <polygon points="96,112 162,62 228,112" fill="rgba(255,255,255,0.05)"/>
    <path d="M108 112 V186 H216 V112"/>
    <rect x="150" y="146" width="26" height="40" fill="rgba(255,255,255,0.04)"/>
    <rect x="120" y="126" width="22" height="20" fill="rgba(255,255,255,0.04)"/>
  </g>

  <!-- Magnifier over the house: audit = inspect + verify -->
  <circle cx="232" cy="150" r="34" fill="#0E5A50" fill-opacity="0.35" stroke="#78C832" stroke-width="8"/>
  <line x1="256" y1="174" x2="284" y2="202" stroke="#78C832" stroke-width="11" stroke-linecap="round"/>
  <path d="M218 150 l10 11 l20 -24" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CMC tag -->
  <rect x="24" y="22" width="62" height="26" rx="13" fill="rgba(255,255,255,0.12)" stroke="#78C832" stroke-width="1.5"/>
  <text x="55" y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">CMC</text>

  <!-- Label -->
  <text x="26" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#FFFFFF" opacity="0.95">Energy Audit</text>
</svg>
