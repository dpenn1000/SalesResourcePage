<style>
:root {
  --green: #78C832;
  --green-dk: #5FA520;
  --blue: #29A9E1;
  --blue-dk: #1E8BBC;
  --gold: #F5A623;
  --gold-dk: #C8851A;
  --pink: #C4457A;
  --teal: #0E9B8A;
  --orange: #E8863A;
  --ink: #0F2038;
  --ink-soft: #1A2942;
  --text: #1A1F2E;
  --muted: #5B6576;
  --subtle: #8B94A3;
  --surface: #F7F8F4;
  --warm: #FAFBF7;
  --white: #FFFFFF;
  --line: #DFE2DA;
  --line-soft: #E8EBE3;
  --warn: #E9A648;
  --red: #C84545;
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(15,32,56,0.06);
  --shadow-md: 0 4px 14px rgba(15,32,56,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Manrope', -apple-system, 'Segoe UI', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  background: var(--surface);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; color: var(--ink); }
h1 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-variation-settings: "opsz" 144; line-height: 1.1; font-weight: 400; }
h2 { font-size: 1.5rem; font-weight: 500; line-height: 1.2; margin-bottom: 8px; }
h3 { font-size: 1.15rem; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
a { color: var(--blue-dk); text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 980px; margin: 0 auto; padding: 0 22px; }

/* HEADER */
.site-header { position: sticky; top: 0; z-index: 200; }
.page-header {
  background: var(--ink);
  color: #fff;
  padding: 14px 0;
  border-bottom: 3px solid var(--gold);
}
.page-header .wrap { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand .logo { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
.brand .divider { width: 1px; height: 26px; background: rgba(255,255,255,0.2); }
.brand .team { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 400; color: rgba(255,255,255,0.7); }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.82rem; font-weight: 600;
  color: rgba(255,255,255,0.55);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.15s;
}
.back-link:hover { background: rgba(255,255,255,0.12); color: #fff; text-decoration: none; }

/* SEARCH + FILTER STRIP */
.tools-bar {
  background: linear-gradient(to bottom, #fff 0%, var(--warm) 100%);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 4px 12px rgba(15,32,56,0.05);
  padding: 14px 0;
}
.tools-bar .wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 240px; position: relative; }
.search-wrap input {
  width: 100%;
  font-family: 'Manrope', sans-serif;
  font-size: 0.95rem;
  padding: 10px 14px 10px 38px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: #fff;
  color: var(--ink);
}
.search-wrap input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
}
.search-wrap::before {
  content: '';
  position: absolute;
  left: 12px; top: 50%;
  width: 16px; height: 16px;
  transform: translateY(-50%);
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235B6576' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") center/contain no-repeat;
}

/* TYPE CHIPS */
.type-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Manrope', sans-serif;
  font-size: 0.78rem; font-weight: 700;
  padding: 7px 12px;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.chip[data-type="announcement"] .dot { background: var(--blue); }
.chip[data-type="heads-up"] .dot { background: var(--gold); }
.chip[data-type="regional"] .dot { background: var(--pink); }
.chip[data-type="coming-soon"] .dot { background: var(--teal); }
.chip[data-type="action-required"] .dot { background: var(--red); }

/* MAIN */
main { padding: 32px 0 80px; }

/* HERO (only shown on feed view) */
.feed-hero {
  margin-bottom: 28px;
}
.feed-hero .eyebrow {
  font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold-dk);
  margin-bottom: 8px;
}
.feed-hero h1 { margin-bottom: 6px; }
.feed-hero .lede { color: var(--muted); font-size: 1.02rem; max-width: 620px; }

/* PINNED SECTION */
.pinned-strip {
  background: linear-gradient(135deg, rgba(245,166,35,0.10), rgba(120,200,50,0.06));
  border: 1px solid rgba(245,166,35,0.28);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-bottom: 26px;
}
.pinned-strip .pin-label {
  font-family: 'Manrope', sans-serif;
  font-size: 0.7rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold-dk);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* CARDS */
.feed { display: grid; gap: 14px; }
.bulletin-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.05s;
  border-left: 4px solid var(--muted);
  overflow: hidden;
}
.bulletin-card .bc-body { padding: 20px 22px; }

/* Inline media on cards */
.bc-media {
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  max-height: 240px;
  overflow: hidden;
}
.bc-media img {
  width: 100%;
  height: auto;
  max-height: 240px;
  object-fit: cover;
  display: block;
}
.bc-media-count {
  position: absolute;
  bottom: 8px; right: 10px;
  background: rgba(15,32,56,0.78);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
}
.bc-media-pdf {
  background: linear-gradient(135deg, rgba(245,166,35,0.12), rgba(120,200,50,0.06));
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  max-height: none;
  justify-content: flex-start;
}
.bc-media-pdf .pdf-icon,
.media-pdf .pdf-icon,
.bc-media-pdf .pdf-name {
  /* see shared pdf-icon below */
}
.pdf-icon {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 38px; height: 44px;
  background: var(--red);
  color: #fff;
  font-weight: 800;
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  border-radius: 4px;
  flex-shrink: 0;
}
.bc-media-pdf .pdf-name {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--ink);
}
.bulletin-card:hover { border-color: var(--ink); box-shadow: var(--shadow-md); }
.bulletin-card:active { transform: translateY(1px); }
.bulletin-card[data-type="announcement"] { border-left-color: var(--blue); }
.bulletin-card[data-type="heads-up"] { border-left-color: var(--gold); }
.bulletin-card[data-type="regional"] { border-left-color: var(--pink); }
.bulletin-card[data-type="coming-soon"] { border-left-color: var(--teal); }
.bulletin-card[data-type="action-required"] { border-left-color: var(--red); }

.bc-meta {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  font-size: 0.78rem;
  color: var(--muted);
}
.bc-type-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-weight: 700; font-size: 0.72rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(91,101,118,0.1);
  color: var(--muted);
}
.bulletin-card[data-type="announcement"] .bc-type-tag { background: rgba(41,169,225,0.14); color: var(--blue-dk); }
.bulletin-card[data-type="heads-up"] .bc-type-tag { background: rgba(245,166,35,0.16); color: var(--gold-dk); }
.bulletin-card[data-type="regional"] .bc-type-tag { background: rgba(196,69,122,0.14); color: var(--pink); }
.bulletin-card[data-type="coming-soon"] .bc-type-tag { background: rgba(14,155,138,0.14); color: var(--teal); }
.bulletin-card[data-type="action-required"] .bc-type-tag { background: rgba(200,69,69,0.14); color: var(--red); }

.bc-pin {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--gold-dk);
  display: inline-flex; align-items: center; gap: 4px;
}
.bc-title {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.3;
}
.bc-excerpt {
  font-size: 0.93rem;
  color: var(--text);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bc-foot {
  display: flex; align-items: center; gap: 14px;
  margin-top: 10px;
  font-size: 0.78rem;
  color: var(--muted);
}
.bc-attach { display: inline-flex; align-items: center; gap: 4px; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
}
.empty-state h3 {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  color: var(--ink);
  margin-bottom: 8px;
}
.empty-state p { max-width: 420px; margin: 0 auto; }

/* DETAIL VIEW */
.detail-actions {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.85rem; font-weight: 600;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 7px 14px;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
}
.detail-back:hover { background: var(--surface); border-color: var(--ink); text-decoration: none; }
.detail-pdf {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.85rem; font-weight: 700;
  color: #fff;
  background: var(--gold-dk);
  border: 1px solid var(--gold-dk);
  border-radius: var(--r-sm);
  padding: 7px 14px;
  cursor: pointer;
  margin-left: auto;
  transition: background 0.15s;
  font-family: 'Manrope', sans-serif;
}
.detail-pdf:hover { background: var(--gold); }

.bc-just-live {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.7rem; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--red);
  background: rgba(200,69,69,0.10);
  border: 1px solid rgba(200,69,69,0.25);
  border-radius: 999px;
  padding: 2px 8px;
}
.detail-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 32px 36px;
  box-shadow: var(--shadow-sm);
  border-left: 5px solid var(--muted);
}
.detail-card[data-type="announcement"] { border-left-color: var(--blue); }
.detail-card[data-type="heads-up"] { border-left-color: var(--gold); }
.detail-card[data-type="regional"] { border-left-color: var(--pink); }
.detail-card[data-type="coming-soon"] { border-left-color: var(--teal); }
.detail-card[data-type="action-required"] { border-left-color: var(--red); }
.detail-meta { margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 0.85rem; color: var(--muted); }
.detail-card h1 { margin-bottom: 12px; }
.detail-body {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text);
}
.detail-body h2, .detail-body h3, .detail-body h4 { margin-top: 24px; margin-bottom: 10px; }
.detail-body h2 { font-size: 1.4rem; }
.detail-body h3 { font-size: 1.15rem; }
.detail-body p { margin-bottom: 14px; }
.detail-body ul, .detail-body ol { padding-left: 22px; margin-bottom: 14px; }
.detail-body li { margin-bottom: 6px; }
.detail-body strong { color: var(--ink); font-weight: 700; }
.detail-body code {
  background: rgba(15,32,56,0.06);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 0.92em;
}
.detail-body pre {
  background: rgba(15,32,56,0.06);
  padding: 12px 16px;
  border-radius: var(--r-sm);
  overflow-x: auto;
  margin-bottom: 14px;
}
.detail-body blockquote {
  border-left: 3px solid var(--gold);
  padding: 6px 16px;
  margin: 14px 0;
  background: var(--warm);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  color: var(--ink-soft);
  font-style: italic;
}
.detail-body img {
  max-width: 100%; height: auto;
  border-radius: var(--r-sm);
  margin: 12px 0;
  border: 1px solid var(--line);
}
.detail-body a { color: var(--blue-dk); text-decoration: underline; }

/* Detail-view inline media */
.media-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-top: 22px;
}
.media-image {
  display: block;
  border-radius: var(--r-sm);
  overflow: hidden;
  border: 1px solid var(--line);
  background: #000;
}
.media-image img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 480px;
  object-fit: contain;
  background: #000;
}
.media-video {
  width: 100%;
  margin-top: 22px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  background: #000;
  max-height: 540px;
}
.media-pdf {
  margin-top: 22px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
  background: #fff;
}
.media-pdf-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  font-size: 0.9rem;
}
.media-pdf-name {
  flex: 1;
  font-weight: 600;
  color: var(--ink);
}
.media-pdf-open {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--blue-dk);
  text-decoration: none;
}
.media-pdf-open:hover { text-decoration: underline; }
.media-pdf iframe {
  width: 100%;
  height: 600px;
  border: 0;
  display: block;
}

.attach-list {
  margin-top: 28px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
}
.attach-list h3 {
  font-family: 'Manrope', sans-serif;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.attach-grid { display: grid; gap: 8px; }
.attach-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  font-size: 0.92rem;
  color: var(--ink);
  text-decoration: none;
}
.attach-item:hover { border-color: var(--ink); background: #fff; text-decoration: none; }
.attach-icon {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(245,166,35,0.12);
  color: var(--gold-dk);
  border-radius: var(--r-sm);
  font-weight: 700;
  font-size: 0.7rem;
}
.attach-name { flex: 1; }
.attach-size { font-size: 0.78rem; color: var(--muted); }

/* FOOTER */
footer {
  padding: 30px 0;
  text-align: center;
  font-size: 0.82rem;
  color: var(--muted);
  background: var(--warm);
  border-top: 1px solid var(--line);
}
footer a { color: var(--blue-dk); }
</style>

<script>
const SUPABASE_URL = 'https://qjcozskyopetvigjhlmh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tBchDunvDSIU2e5L7KIzWA_G1og1Ru2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TYPE_LABEL = {
  'announcement': 'Announcement',
  'heads-up': 'Heads-up',
  'regional': 'Regional Message',
  'coming-soon': 'Coming Soon',

};

function isImage(att) { return att && att.type && att.type.startsWith('image/'); }
function isPdf(att)   { return att && att.type === 'application/pdf'; }
function isVideo(att) { return att && att.type && att.type.startsWith('video/'); }

function effectivePublishAt(b) {
  return b.publish_at || b.posted_at;
}
function isLive(b) {
  const t = effectivePublishAt(b);
  return !t || new Date(t) <= new Date();
}
function isJustLive(b) {
  const t = effectivePublishAt(b);
  if (!t) return false;
  const ms = Date.now() - new Date(t).getTime();
  return ms >= 0 && ms < 24 * 60 * 60 * 1000; // last 24h
}

let ALL_BULLETINS = [];
let activeType = 'all';
let searchQuery = '';

function getSlugFromUrl() {
  const params = new URLSearchParams(location.search);
  return params.get('b') || null;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const days = Math.floor(diffMs / 86400000);
  if (days < 1 && d.toDateString() === now.toDateString()) {
    return 'Today, ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  if (days < 2) return 'Yesterday';
  if (days < 7) return days + ' days ago';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: d.getFullYear() === now.getFullYear() ? undefined : 'numeric' });
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderHtml(html) {
  if (!html) return '';
  return DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] });
}

function excerpt(html, max = 220) {
  if (!html) return '';
  // Strip tags for plain-text excerpt
  const tmp = document.createElement('div');
  tmp.innerHTML = DOMPurify.sanitize(html);
  const text = (tmp.textContent || '').replace(/\s+/g, ' ').trim();
  return text.length > max ? text.slice(0, max).trim() + '…' : text;
}

function fileExtBadge(name, type) {
  const ext = (name?.split('.').pop() || type?.split('/').pop() || 'FILE').toUpperCase().slice(0, 4);
  return ext;
}

function renderFeed() {
  const root = document.getElementById('root');
  document.getElementById('toolsBar').style.display = '';

  const filtered = ALL_BULLETINS.filter(b => {
    if (activeType !== 'all' && b.type !== activeType) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!(b.title.toLowerCase().includes(q) ||
            excerpt(b.body_html || '').toLowerCase().includes(q) ||
            (TYPE_LABEL[b.type] || '').toLowerCase().includes(q))) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (a.priority !== b.priority) return (b.priority||0) - (a.priority||0);
    return new Date(effectivePublishAt(b)) - new Date(effectivePublishAt(a));
  });

  const pinned = filtered.filter(b => b.pinned);
  const rest   = filtered.filter(b => !b.pinned);

  if (filtered.length === 0) {
    if (ALL_BULLETINS.length === 0) {
      root.innerHTML = `
        <div class="feed-hero">
          <div class="eyebrow">CT Traditional &middot; News</div>
          <h1>Updates &amp; Announcements</h1>
          <p class="lede">Formal announcements, regional reminders, and what's coming down the road.</p>
        </div>
        <div class="empty-state">
          <h3>No updates yet</h3>
          <p>When a manager posts the first bulletin, it will appear here. Check back soon.</p>
        </div>`;
    } else {
      root.innerHTML = `
        <div class="feed-hero">
          <div class="eyebrow">CT Traditional &middot; News</div>
          <h1>Updates &amp; Announcements</h1>
        </div>
        <div class="empty-state">
          <h3>No matches</h3>
          <p>No bulletins match your search. Try a different keyword or clear the filter.</p>
        </div>`;
    }
    return;
  }

  let html = `
    <div class="feed-hero">
      <div class="eyebrow">CT Traditional &middot; News</div>
      <h1>Updates &amp; Announcements</h1>
      <p class="lede">Formal announcements, regional reminders, and what's coming down the road.</p>
    </div>
  `;

  if (pinned.length) {
    html += `<div class="pinned-strip">
      <div class="pin-label">&#128204; Pinned</div>
      <div class="feed">${pinned.map(cardHtml).join('')}</div>
    </div>`;
  }

  if (rest.length) {
    html += `<div class="feed">${rest.map(cardHtml).join('')}</div>`;
  }

  root.innerHTML = html;

  root.querySelectorAll('.bulletin-card').forEach(el => {
    el.addEventListener('click', () => {
      const slug = el.getAttribute('data-slug');
      navigateTo(slug);
    });
  });

  // mark all as seen
  try {
    const newest = ALL_BULLETINS.reduce((m, b) => Math.max(m, +new Date(b.posted_at)), 0);
    if (newest) localStorage.setItem('ctrp_lastSeenUpdatesAt', String(newest));
  } catch (e) {}
}

function cardHtml(b) {
  const atts = Array.isArray(b.attachments) ? b.attachments : [];
  const images = atts.filter(isImage);
  const pdfs = atts.filter(isPdf);
  const others = atts.filter(a => !isImage(a) && !isPdf(a) && !isVideo(a));
  const otherCount = atts.length - images.length;

  // Inline image preview at top of card (first image only)
  let mediaHtml = '';
  if (images.length) {
    const img = images[0];
    mediaHtml = `<div class="bc-media"><img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.name || '')}" loading="lazy">${images.length > 1 ? `<span class="bc-media-count">+${images.length - 1}</span>` : ''}</div>`;
  } else if (pdfs.length) {
    mediaHtml = `<div class="bc-media bc-media-pdf"><span class="pdf-icon">PDF</span><span class="pdf-name">${escapeHtml(pdfs[0].name)}</span></div>`;
  }

  return `
    <article class="bulletin-card" data-type="${escapeHtml(b.type)}" data-slug="${escapeHtml(b.slug)}">
      ${mediaHtml}
      <div class="bc-body">
        <div class="bc-meta">
          <span class="bc-type-tag"><span class="dot"></span>${escapeHtml(TYPE_LABEL[b.type] || b.type)}</span>
          <span>${escapeHtml(fmtDate(effectivePublishAt(b)))}</span>
          ${isJustLive(b) ? '<span class="bc-just-live">&#128308; Just live</span>' : ''}
          ${b.pinned ? '<span class="bc-pin">&#128204; Pinned</span>' : ''}
        </div>
        <div class="bc-title">${escapeHtml(b.title)}</div>
        <div class="bc-excerpt">${escapeHtml(excerpt(b.body_html))}</div>
        <div class="bc-foot">
          ${otherCount ? `<span class="bc-attach">&#128206; ${otherCount} attachment${otherCount === 1 ? '' : 's'}</span>` : ''}
          <span style="margin-left:auto">Read more &rarr;</span>
        </div>
      </div>
    </article>
  `;
}

function renderDetail(slug) {
  const root = document.getElementById('root');
  document.getElementById('toolsBar').style.display = 'none';

  const b = ALL_BULLETINS.find(x => x.slug === slug);
  if (!b) {
    root.innerHTML = `
      <a href="/updates/" class="detail-back">&larr; All updates</a>
      <div class="empty-state">
        <h3>Update not found</h3>
        <p>The bulletin you're looking for may have expired or been removed.</p>
      </div>`;
    return;
  }

  const attaches = Array.isArray(b.attachments) ? b.attachments : [];
  const imageAtts = attaches.filter(isImage);
  const pdfAtts   = attaches.filter(isPdf);
  const videoAtts = attaches.filter(isVideo);
  const otherAtts = attaches.filter(a => !isImage(a) && !isPdf(a) && !isVideo(a));

  let html = `
    <div class="detail-actions">
      <a href="/updates/" class="detail-back">&larr; All updates</a>
      <button type="button" class="detail-pdf" onclick="downloadCurrentBulletinAsPdf()" title="Download as PDF">&#128229; Download PDF</button>
    </div>
    <article id="detailArticle" class="detail-card" data-type="${escapeHtml(b.type)}">
      <div class="detail-meta">
        <span class="bc-type-tag"><span class="dot"></span>${escapeHtml(TYPE_LABEL[b.type] || b.type)}</span>
        <span>Posted ${escapeHtml(fmtDate(effectivePublishAt(b)))}</span>
        ${isJustLive(b) ? '<span class="bc-just-live">&#128308; Just live</span>' : ''}
        ${b.pinned ? '<span class="bc-pin">&#128204; Pinned</span>' : ''}
        ${b.author_email ? `<span>by ${escapeHtml(b.author_email)}</span>` : ''}
      </div>
      <h1>${escapeHtml(b.title)}</h1>
      <div class="detail-body">${renderHtml(b.body_html)}</div>
  `;

  // Inline media: images, PDFs, videos
  if (imageAtts.length) {
    html += `<div class="media-grid">` + imageAtts.map(a => `
      <a class="media-image" href="${escapeHtml(a.url)}" target="_blank" rel="noopener" title="Open full size">
        <img src="${escapeHtml(a.url)}" alt="${escapeHtml(a.name || '')}" loading="lazy">
      </a>`).join('') + `</div>`;
  }
  if (videoAtts.length) {
    html += videoAtts.map(a => `
      <video class="media-video" controls preload="metadata" src="${escapeHtml(a.url)}"></video>
    `).join('');
  }
  if (pdfAtts.length) {
    html += pdfAtts.map(a => `
      <div class="media-pdf">
        <div class="media-pdf-head">
          <span class="pdf-icon">PDF</span>
          <span class="media-pdf-name">${escapeHtml(a.name)}</span>
          <a class="media-pdf-open" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">Open in new tab &nearr;</a>
        </div>
        <iframe src="${escapeHtml(a.url)}#view=FitH" loading="lazy"></iframe>
      </div>
    `).join('');
  }

  if (otherAtts.length) {
    html += `
      <div class="attach-list">
        <h3>Files</h3>
        <div class="attach-grid">
          ${otherAtts.map(a => `
            <a class="attach-item" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">
              <span class="attach-icon">${escapeHtml(fileExtBadge(a.name, a.type))}</span>
              <span class="attach-name">${escapeHtml(a.name)}</span>
              ${a.size ? `<span class="attach-size">${escapeHtml(fmtSize(a.size))}</span>` : ''}
            </a>
          `).join('')}
        </div>
      </div>`;
  }

  html += `</article>`;
  root.innerHTML = html;

  // mark this seen
  try {
    const ts = +new Date(b.posted_at);
    const prev = +(localStorage.getItem('ctrp_lastSeenUpdatesAt') || 0);
    if (ts > prev) localStorage.setItem('ctrp_lastSeenUpdatesAt', String(ts));
  } catch (e) {}
}

function downloadCurrentBulletinAsPdf() {
  const slug = getSlugFromUrl();
  if (!slug) return;
  const b = ALL_BULLETINS.find(x => x.slug === slug);
  if (!b) return;
  const node = document.getElementById('detailArticle');
  if (!node || !window.html2pdf) {
    alert('PDF library not loaded yet. Try again in a moment.');
    return;
  }
  const filename = (b.slug || 'update') + '.pdf';
  const opt = {
    margin:       [0.5, 0.5, 0.5, 0.5],
    filename:     filename,
    image:        { type: 'jpeg', quality: 0.95 },
    html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
  };
  html2pdf().set(opt).from(node).save();
}

function navigateTo(slug) {
  if (slug) {
    history.pushState({ slug }, '', '/updates/?b=' + encodeURIComponent(slug));
    renderDetail(slug);
  } else {
    history.pushState({}, '', '/updates/');
    renderFeed();
  }
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => {
  const slug = getSlugFromUrl();
  if (slug) renderDetail(slug); else renderFeed();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (!getSlugFromUrl()) renderFeed();
});

document.querySelectorAll('.type-chips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.type-chips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeType = chip.getAttribute('data-type');
    if (!getSlugFromUrl()) renderFeed();
  });
});

async function loadAndRender() {
  try {
    const { data, error } = await sb
      .from('bulletins')
      .select('*')
      .eq('active', true)
      .order('posted_at', { ascending: false });

    if (error) {
      // Surface a helpful message if the table doesn't exist yet
      const root = document.getElementById('root');
      const isMissing = /relation .* does not exist/i.test(error.message || '') ||
                        /not found/i.test(error.message || '');
      root.innerHTML = `
        <div class="feed-hero">
          <div class="eyebrow">CT Traditional &middot; News</div>
          <h1>Updates &amp; Announcements</h1>
        </div>
        <div class="empty-state">
          <h3>${isMissing ? 'Setup pending' : 'Could not load updates'}</h3>
          <p>${isMissing
            ? 'The bulletins table has not been created yet. An admin needs to apply the one-time migration.'
            : escapeHtml(error.message || 'Unknown error')}</p>
        </div>`;
      return;
    }

    ALL_BULLETINS = (data || []).filter(b => {
      if (b.expires_at && new Date(b.expires_at) <= new Date()) return false;
      if (b.publish_at && new Date(b.publish_at) > new Date()) return false;
      return true;
    });

    const slug = getSlugFromUrl();
    if (slug) renderDetail(slug); else renderFeed();
  } catch (err) {
    console.error(err);
    document.getElementById('root').innerHTML = `
      <div class="empty-state">
        <h3>Connection error</h3>
        <p>${escapeHtml(err.message || String(err))}</p>
      </div>`;
  }
}

loadAndRender();
</script>

</body>
</html>
