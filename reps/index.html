<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rep Console moved -- Trinity Solar CT</title>
<!-- The Rep Console was folded into the admin panel as the master-detail
     "People" surface (admin.html, Users tab) on 2026-06-03. This page is now
     a redirect stub. Any ?rep=<username> deep-link is carried through. -->
<meta http-equiv="refresh" content="0; url=/admin.html?tab=users">
<script>
  (function () {
    var rep = new URLSearchParams(location.search).get('rep');
    var dest = '/admin.html?tab=users' + (rep ? '&rep=' + encodeURIComponent(rep) : '');
    location.replace(dest);
  })();
</script>
</head>
<body>
<p style="font-family:system-ui,sans-serif;padding:24px;color:#1A2332">
  The Rep Console moved into the admin panel.
  <a href="/admin.html?tab=users">Open People (Reps &amp; Managers)</a>.
</p>
</body>
</html>
