name: Security

# Continuous security scanning for the public ct-resource-page.com site.
# Runs on every push/PR to main, weekly, and on demand. Findings land in the
# repo's Security tab (Code scanning alerts). Pairs with the local monthly AI
# security sweep in the CT Tools launcher (deterministic-first, AI-for-synthesis).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so a secret committed-then-removed is caught
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Free for public repositories. Fails the build if a secret is detected.

  sast-semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to Code scanning
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Run semgrep (non-blocking; reports to Security tab)
        run: semgrep scan --config p/secrets --config p/owasp-top-ten --config p/xss --sarif --output semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  codeql:
    name: CodeQL (javascript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
