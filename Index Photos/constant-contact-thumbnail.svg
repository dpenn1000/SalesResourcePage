<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2038"/><stop offset="1" stop-color="#1A2942"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E84040"/><stop offset="1" stop-color="#29A9E1"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78C832"/><stop offset="1" stop-color="#29A9E1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1000" cy="150" r="280" fill="#E84040" opacity="0.10"/>
  <circle cx="200" cy="600" r="240" fill="#29A9E1" opacity="0.10"/>

  <!-- timeline motif: dots and line across the bottom-left -->
  <line x1="92" y1="612" x2="640" y2="612" stroke="url(#dot)" stroke-width="3" opacity="0.55"/>
  <circle cx="92"  cy="612" r="9" fill="#78C832"/>
  <circle cx="201" cy="612" r="7" fill="#29A9E1"/>
  <circle cx="310" cy="612" r="7" fill="#E9A648"/>
  <circle cx="420" cy="612" r="7" fill="#E84040"/>
  <circle cx="530" cy="612" r="7" fill="#78C832"/>
  <circle cx="640" cy="612" r="9" fill="#29A9E1"/>

  <text x="92" y="210" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="9">CUSTOMER EXPERIENCE</text>
  <rect x="92" y="238" width="130" height="9" rx="4" fill="url(#acc)"/>
  <text x="84" y="372" fill="#FFFFFF" font-family="Georgia,'Times New Roman',serif" font-size="112" font-weight="700">Constant</text>
  <text x="84" y="492" fill="#FFFFFF" font-family="Georgia,'Times New Roman',serif" font-size="112" font-weight="700">Contact</text>
  <text x="92" y="582" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="600" letter-spacing="2">Touches &#183; Cadence &#183; Referrals</text>
</svg>
