<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2038"/><stop offset="1" stop-color="#1A2942"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78C832"/><stop offset="1" stop-color="#29A9E1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="140" r="280" fill="#78C832" opacity="0.10"/>
  <circle cx="180" cy="580" r="240" fill="#29A9E1" opacity="0.10"/>

  <!-- hover-card nod: a small green "?" mark in the upper right -->
  <circle cx="1050" cy="190" r="32" fill="#78C832"/>
  <text x="1050" y="204" fill="#FFFFFF" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" text-anchor="middle">?</text>

  <!-- eyebrow -->
  <text x="92" y="210" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="9">CLOSING &#183; THE AGREEMENT</text>
  <rect x="92" y="238" width="130" height="9" rx="4" fill="url(#acc)"/>

  <!-- title -->
  <text x="84" y="360" fill="#FFFFFF" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="76" font-weight="400">Walk the</text>
  <text x="84" y="478" fill="#FFFFFF" font-family="Georgia,'Times New Roman',serif" font-size="100" font-weight="700">LightReach PPA</text>

  <!-- signature line at the bottom + subtitle -->
  <text x="92" y="582" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="600" letter-spacing="2">Section by section &#183; No surprises at signing</text>
  <line x1="92" y1="612" x2="640" y2="612" stroke="#9FB3C8" stroke-width="2" opacity="0.45"/>
  <circle cx="92" cy="612" r="6" fill="#78C832"/>
  <circle cx="640" cy="612" r="6" fill="#29A9E1"/>
</svg>
