<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1626"/><stop offset="1" stop-color="#1A2942"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78C832"/><stop offset="1" stop-color="#29A9E1"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#29A9E1" stroke-width="1" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="1015" cy="150" r="250" fill="#78C832" opacity="0.10"/>
  <circle cx="170" cy="600" r="220" fill="#29A9E1" opacity="0.08"/>

  <!-- eyebrow -->
  <text x="92" y="192" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="8">TECHNOLOGY</text>
  <rect x="92" y="214" width="120" height="8" rx="4" fill="url(#acc)"/>

  <!-- tool prompt, mono -->
  <text x="88" y="306" fill="#78C832" font-family="'Courier New',monospace" font-size="44" font-weight="700" letter-spacing="1">&gt; oneBUTTON</text>

  <!-- title, serif -->
  <text x="84" y="424" fill="#FFFFFF" font-family="Georgia,'Times New Roman',serif" font-size="106" font-weight="700">The Top 10</text>

  <!-- subtitle -->
  <text x="92" y="494" fill="#9FB3C8" font-family="'Helvetica Neue',Arial,sans-serif" font-size="31" font-weight="600" letter-spacing="1">What looks broken, and the fix that works</text>

  <!-- signal lights -->
  <circle cx="105" cy="556" r="13" fill="#78C832"/>
  <circle cx="151" cy="556" r="13" fill="#E9A648"/>
  <circle cx="197" cy="556" r="13" fill="#E84040"/>
  <circle cx="243" cy="556" r="13" fill="#29A9E1"/>
  <text x="278" y="565" fill="#6B7A8D" font-family="'Courier New',monospace" font-size="25" letter-spacing="2">self-fix / verify / stop / not you</text>
</svg>
