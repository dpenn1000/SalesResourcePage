<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'Plus Jakarta Sans',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="apexbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="apexgreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a6e34d"/>
      <stop offset="1" stop-color="#5eba28"/>
    </linearGradient>
    <radialGradient id="apexshade" cx="0.18" cy="0.5" r="0.95">
      <stop offset="0" stop-color="#0b1120" stop-opacity="0.92"/>
      <stop offset="0.65" stop-color="#0b1120" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b1120" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#apexbg)"/>
  <!-- efficiency dial motif (mirrors the APEX hero) -->
  <g transform="translate(955,330)">
    <circle r="178" fill="none" stroke="#22314c" stroke-width="34"/>
    <circle r="178" fill="none" stroke="url(#apexgreen)" stroke-width="34" stroke-linecap="round"
            stroke-dasharray="838 1118" transform="rotate(-90)"/>
    <text x="0" y="-2" text-anchor="middle" fill="#e8edf5" font-size="70" font-weight="800">75%</text>
    <text x="0" y="44" text-anchor="middle" fill="#8a96ad" font-size="22" font-weight="700" letter-spacing="3">CLOSE RATE</text>
  </g>
  <rect width="1200" height="675" fill="url(#apexshade)"/>
  <!-- left titles -->
  <text x="80" y="232" fill="#78C832" font-size="26" font-weight="800" letter-spacing="6">EXECUTIVE EFFICIENCY ENGINE</text>
  <rect x="82" y="252" width="132" height="5" rx="2" fill="#78C832"/>
  <text x="72" y="438" fill="#ffffff" font-size="196" font-weight="800" letter-spacing="3">APEX</text>
  <text x="84" y="506" fill="#9fb0c8" font-size="30" font-family="'DM Mono','Courier New',monospace" letter-spacing="3">cobra  &#8594;  viper  &#8594;  apex</text>
  <text x="84" y="560" fill="#6b7a90" font-size="25" font-weight="600">NY / LI sales &amp; outreach profitability</text>
</svg>
