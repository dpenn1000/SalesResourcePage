<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trinity Lead Audit Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green: #78C832;
  --green-dark: #5eba28;
  --blue: #29A9E1;
  --ink: #1A2332;
  --warm: #EFF1EC;
  --border: #DFE2DA;
  --paper: #fff;
  --muted: #6B7280;
  --slate: #475569;
  --red: #DC2626;
  --orange: #EA580C;
  --amber: #D97706;
  /* Semantic tokens for theme variations */
  --bg-page: var(--warm);
  --bg-card: var(--paper);
  --bg-header: var(--ink);
  --bg-row-hover: #fafaf8;
  --bg-row-expanded: #e8f3d6;
  --bg-note-row: #ffffff;
  --bg-section-header: var(--warm);
  --bg-description: #fafaf8;
  --bg-input: #ffffff;
  --bg-bar-track: var(--warm);
  --bg-tab-badge: var(--warm);
  --bg-banner-compliance: #fef2f2;
  --border-row: #d4d8c8;
  --border-strong: #c5cab8;
  --tab-compliance-color: #b91c1c;
  --bg-tag-compliance: #991b1b;
  --header-text: #ffffff;
}

/* DARK THEME -- triggered by <html data-theme="dark"> */
[data-theme="dark"] {
  --green: #8de440;
  --green-dark: #78C832;
  --blue: #4dc4f7;
  --ink: #e8eaee;
  --warm: #0d1119;
  --border: #2a2f37;
  --paper: #1f2228;
  --muted: #8a8f97;
  --slate: #b0b5bd;
  --red: #f87171;
  --orange: #fb923c;
  --amber: #fbbf24;
  /* Semantic overrides */
  --bg-page: #0d1119;
  --bg-card: #1f2228;
  --bg-header: #060912;
  --bg-row-hover: #252a32;
  --bg-row-expanded: #2a3a1f;
  --bg-note-row: #1f2228;
  --bg-section-header: #15181f;
  --bg-description: #15181f;
  --bg-input: #15181f;
  --bg-bar-track: #2a2f37;
  --bg-tab-badge: #2a2f37;
  --bg-banner-compliance: #4a1313;
  --border-row: #2a2f37;
  --border-strong: #353a44;
  --tab-compliance-color: #f87171;
  --bg-tag-compliance: #7f1818;
  --header-text: #ffffff;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}
.container { max-width: 1500px; margin: 0 auto; padding: 0 20px; }
header { background: var(--bg-header); color: var(--header-text); padding: 16px 0; }
header .container { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
header h1 { font-size: 22px; font-weight: 600; }
header .scope { font-size: 12px; opacity: 0.75; margin-top: 3px; }
header .actions { display: flex; gap: 8px; flex-wrap: wrap; }
header .actions button {
  padding: 8px 14px; background: var(--green); color: white;
  border: none; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 13px;
}
header .actions button:hover { background: var(--green-dark); }
header .actions button.secondary {
  background: transparent; color: var(--header-text);
  border: 1px solid rgba(255,255,255,0.3);
}
header .actions button.secondary:hover { background: rgba(255,255,255,0.08); }
.tabs { background: var(--bg-card); border-bottom: 2px solid var(--border); overflow-x: auto; }
.tabs .container { display: flex; gap: 0; }
.tab {
  padding: 12px 14px; background: none; border: none; cursor: pointer;
  font-size: 12.5px; font-weight: 500; color: var(--slate);
  border-bottom: 3px solid transparent; white-space: nowrap;
}
.tab:hover { background: var(--bg-page); }
.tab.active { color: var(--ink); border-bottom-color: var(--green); }
.tab.compliance.active { border-bottom-color: var(--red); }
.tab.compliance { color: var(--tab-compliance-color); }
.tab-badge {
  display: inline-block; margin-left: 5px; padding: 1px 7px;
  background: var(--bg-tab-badge); border-radius: 10px; font-size: 11px;
  color: var(--slate); min-width: 18px; text-align: center;
}
.tab.active .tab-badge { background: var(--green); color: white; }
.tab.compliance.active .tab-badge { background: var(--red); color: white; }
.tab-divider { padding: 12px 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; align-self: center; }
main { padding: 20px 0 60px; }
.panel { display: none; }
.panel.active { display: block; }
h2 { font-size: 18px; margin-bottom: 10px; }
h3 { font-size: 15px; color: var(--slate); margin-bottom: 6px; font-weight: 600; }
.section-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.compliance-banner {
  background: var(--bg-banner-compliance);
  border-left: 4px solid var(--red);
  padding: 12px 16px; margin-bottom: 16px; border-radius: 4px;
  font-size: 13px;
}
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
.card .label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
.card .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
.card .value.alert { color: var(--red); }
.card .value.ok { color: var(--green-dark); }
.card .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 24px;
  /* Allow horizontal scroll inside the card so wide tables don't blow out the viewport on mobile */
  overflow-x: auto;
}
.section-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg-section-header); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.section-header h2 { margin: 0; font-size: 15px; }
.section-body { padding: 0; overflow-x: auto; }
.section-body.padded { padding: 14px 16px; }
.description { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--slate); font-size: 13px; background: var(--bg-description); }
.filters {
  display: flex; gap: 12px; flex-wrap: wrap; padding: 10px 14px;
  border-bottom: 1px solid var(--border); background: var(--bg-card); align-items: center;
}
.filters .filter-group { display: flex; align-items: center; gap: 6px; }
.filters label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.filters input, .filters select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 13px; background: var(--bg-input); color: var(--ink); min-width: 110px;
}
.filters input[type="search"] { min-width: 180px; max-width: 100%; }
.filters .clear-btn {
  padding: 6px 10px; background: var(--bg-input); color: var(--slate);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px;
}
.filters .clear-btn:hover { background: var(--bg-page); }
.filters .export-btn {
  padding: 6px 12px; background: var(--ink); color: white;
  border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: auto;
}
.filters .export-btn:hover { background: var(--slate); }
/* In dark mode, --ink becomes the light text color, so override to a visible button */
[data-theme="dark"] .filters .export-btn {
  background: var(--green);
  color: var(--bg-page);
  font-weight: 600;
}
[data-theme="dark"] .filters .export-btn:hover { background: var(--green-dark); }
/* Tables fill the full width of their section card so colspan rows
   (notes) stretch to the visible width. Wide tables can scroll
   horizontally inside the section. */
.section-body { overflow-x: auto; }
table {
  width: 100%;
  min-width: max-content;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: auto;
}
th, td { text-align: left; padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
th { font-weight: 600; color: var(--slate); background: var(--bg-section-header); cursor: pointer; user-select: none; position: sticky; top: 0; white-space: nowrap; }
th:hover { background: var(--border-strong); }
th.sort-asc::after { content: " ▲"; font-size: 10px; }
th.sort-desc::after { content: " ▼"; font-size: 10px; }
th.num, td.num {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
tbody tr.row { cursor: pointer; }
tbody tr.row td { border-top: 2px solid var(--border-row); }
tbody tr.row:hover { background: var(--bg-row-hover); }
tbody tr.row:hover td { background: var(--bg-row-hover); }
/* Expanded HEADER row -- green tint, clear top border + left/right corners */
tbody tr.row.expanded td {
  border-top: 3px solid var(--green);
  background: var(--bg-row-expanded);
  font-weight: 500;
}
tbody tr.row.expanded td:first-child { border-left: 3px solid var(--green); }
tbody tr.row.expanded td:last-child  { border-right: 3px solid var(--green); }
/* Expanded BODY (note row) -- card-color background; green frame on left + right + bottom closes the box */
tr.note-row td {
  padding: 12px 16px 16px;
  background: var(--bg-note-row);
  font-size: 13px;
  color: var(--slate);
  border-top: none;
  border-left: 3px solid var(--green);
  border-right: 3px solid var(--green);
  border-bottom: 3px solid var(--green);
  /* Ensure long notes wrap inside the visible card width */
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}
tr.note-row td > div { max-width: 100%; word-wrap: break-word; overflow-wrap: break-word; }
tr.note-row .matched { color: var(--red); font-weight: 500; }
tr.note-row .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
.severity-escalate { color: var(--red); font-weight: 600; }
.severity-review { color: var(--orange); font-weight: 500; }
.severity-watch { color: var(--slate); }
.compliance-tag {
  display: inline-block; padding: 2px 8px; background: var(--bg-tag-compliance);
  color: white; border-radius: 3px; font-size: 10px; letter-spacing: 0.5px;
  text-transform: uppercase; font-weight: 600;
}
.bar-chart { padding: 14px 16px; }
.bar-row { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; }
.bar-row .name { flex: 0 0 220px; color: var(--ink); }
.bar-row .bar { flex: 1; height: 18px; background: var(--bg-bar-track); border-radius: 2px; overflow: hidden; min-width: 40px; }
.bar-row .bar-fill { height: 100%; background: var(--green); transition: width 0.3s; }
.bar-row.compliance .bar-fill { background: var(--red); }
.bar-row .count {
  flex: 0 0 70px; text-align: right; font-weight: 500;
  margin-left: 10px; font-variant-numeric: tabular-nums;
}
.empty { padding: 30px; text-align: center; color: var(--muted); }
.subtle { color: var(--muted); font-size: 12px; }
.kbd {
  display: inline-block; padding: 1px 5px;
  background: var(--warm); border: 1px solid var(--border);
  border-radius: 3px; font-family: ui-monospace, monospace;
  font-size: 11px;
}
@media (max-width: 700px) {
  .container { padding: 0 12px; }
  header h1 { font-size: 18px; }
  .bar-row .name { flex: 0 0 140px; font-size: 12px; }
  .bar-row .count { flex: 0 0 50px; }
  .card .value { font-size: 22px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .filters input[type="search"] { min-width: 140px; }
}

@media print {
  .tabs, header .actions, .filters .export-btn, .filters .clear-btn { display: none !important; }
  .panel { display: block !important; page-break-after: always; }
  header { background: white; color: var(--ink); border-bottom: 2px solid var(--ink); }
  body { background: white; }
}
</style>

// ---- index flags by primary issue type (one row per appointment) ----
const flagsByIssue = {};
DATA.issue_flags.forEach(f => {
  const primary = f.primary_issue_type || (f.issue_types && f.issue_types[0]);
  if (!primary) return;
  if (!flagsByIssue[primary]) flagsByIssue[primary] = [];
  flagsByIssue[primary].push(f);
});

// ---- helpers ----
function fmtPct(v) { return (typeof v === 'number') ? v.toFixed(1) + '%' : '-'; }
function fmtN(v)   { return (typeof v === 'number') ? v.toLocaleString() : (v || '-'); }
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function severityClass(s) { return 'severity-' + (s || 'watch'); }

// ---- scope info ----
function renderScope() {
  const s = DATA.scope;
  document.getElementById('scope-info').textContent =
    `${fmtN(s.rows_completed)} completed appointments / ${fmtN(s.unique_leads)} unique leads / ` +
    `${s.states.join(', ')} / Generated ${DATA.generated_at} / Source: ${DATA.source_report}`;
}

// ---- tabs ----
function renderTabs() {
  const strip = document.getElementById('tab-strip');
  let html = '';
  html += `<button class="tab active" data-tab="summary">Summary</button>`;
  html += `<button class="tab" data-tab="states">By State</button>`;
  html += `<button class="tab" data-tab="setters">By Setter</button>`;
  html += `<button class="tab" data-tab="multi">Multi-Apt Leads</button>`;
  html += `<span class="tab-divider">Issues</span>`;
  ISSUE_ORDER.forEach(t => {
    if (!flagsByIssue[t] || flagsByIssue[t].length === 0) return;
    const isComp = COMPLIANCE_TYPES.has(t);
    const cls = isComp ? 'tab compliance' : 'tab';
    const label = ISSUE_LABELS[t] || t;
    html += `<button class="${cls}" data-tab="issue:${t}">${escapeHtml(label)} <span class="tab-badge">${flagsByIssue[t].length}</span></button>`;
  });
  strip.innerHTML = html;
  strip.querySelectorAll('.tab').forEach(b => {
    b.onclick = () => switchTab(b.dataset.tab);
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === name));
  // Build panel lazily
  const panel = document.querySelector(`[data-panel="${CSS.escape(name)}"]`);
  if (panel && !panel.dataset.built) {
    buildPanel(name, panel);
    panel.dataset.built = '1';
  }
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function buildPanel(name, panel) {
  if (name === 'summary') panel.innerHTML = renderSummary();
  else if (name === 'states') panel.innerHTML = renderStatesPanel();
  else if (name === 'setters') panel.innerHTML = renderSettersPanel();
  else if (name === 'multi') panel.innerHTML = renderMultiAptPanel();
  else if (name.startsWith('issue:')) {
    const issueType = name.slice(6);
    panel.innerHTML = renderIssuePanel(issueType);
    wireIssuePanel(panel, issueType);
  }
  // Wire up sortable tables
  panel.querySelectorAll('table.sortable').forEach(wireSortableTable);
  // Wire up row expansion
  panel.querySelectorAll('table.expandable tbody').forEach(wireExpandable);
}

function renderPanels() {
  const c = document.getElementById('panels');
  let html = `<section class="panel active" data-panel="summary"></section>`;
  html += `<section class="panel" data-panel="states"></section>`;
  html += `<section class="panel" data-panel="setters"></section>`;
  html += `<section class="panel" data-panel="multi"></section>`;
  ISSUE_ORDER.forEach(t => {
    if (!flagsByIssue[t] || flagsByIssue[t].length === 0) return;
    html += `<section class="panel" data-panel="issue:${t}"></section>`;
  });
  c.innerHTML = html;
  // Build summary immediately
  const summaryPanel = document.querySelector('[data-panel="summary"]');
  buildPanel('summary', summaryPanel);
  summaryPanel.dataset.built = '1';
}

  html += `<div class="section-header"><h2>Issue distribution</h2><span class="subtle">${totals.length} issue types with at least one flag</span></div>`;

        <td class="num">${fmtPct(s.no_show_pct)}</td>
        <td class="num">${fmtPct(s.cancelled_pct)}</td>
        <td class="num">${fmtN(s.issue_count)}</td>
        <td class="num">${fmtPct(s.issue_per_100)}</td>
      </tr>`).join('');
    }
    search.oninput = refresh; stateF.onchange = refresh; minF.oninput = refresh;
    refresh();
  }, 0);
  return html;
}

// ---- MULTI-APPT LEADS PANEL ----

  html += `<div class="card-grid">`;
  html += `<div class="card"><div class="label">Total leads</div><div class="value">${fmtN(m.total_unique_leads)}</div></div>`;
  html += `<div class="card"><div class="label">Single-appt</div><div class="value">${fmtN(m.single_apt_leads)}</div></div>`;
  html += `<div class="card"><div class="label">Multi-appt</div><div class="value alert">${fmtN(m.multi_apt_leads)}</div><div class="sub">${m.multi_apt_pct}% of leads</div></div>`;
  html += `<div class="card"><div class="label">Max apts on a lead</div><div class="value">${m.max_apts_for_single_lead}</div></div>`;
  html += `</div>`;

  html += `<div class="section">`;
  html += `<div class="section-header"><h2>Notable multi-appointment leads</h2><span class="subtle">Top leads by appointment count and issue presence</span></div>`;
  html += `<table class="sortable"><thead><tr><th>DL</th><th>Customer</th><th>State</th><th class="num">Apts</th><th>First Setter</th><th>Outcome sequence</th><th>Issues</th></tr></thead><tbody>`;
  (DATA.notable_multi_apt_leads || []).slice(0, 50).forEach(lg => {
    const seq = (lg.outcome_sequence || []).map(o => o.length > 18 ? o.slice(0, 18) + '...' : o).join(' → ');
    const issues = (lg.issue_types_union || []).join(', ') || '-';
    html += `<tr><td>${escapeHtml(lg.dl_number || '-')}</td>`;
    html += `<td>${escapeHtml((lg.customer || '').slice(0, 30))}</td>`;
    html += `<td>${escapeHtml((lg.states || []).join(','))}</td>`;
    html += `<td class="num">${lg.appointment_count}</td>`;
    html += `<td>${escapeHtml(lg.first_setter)}</td>`;

    html += `<td>${escapeHtml(issues)}</td></tr>`;
  });
  html += `</tbody></table></div>`;

  return html;
}

// ---- ISSUE PANEL ----
function renderIssuePanel(issueType) {
  const flags = flagsByIssue[issueType] || [];
  const isComp = COMPLIANCE_TYPES.has(issueType);
  const label = ISSUE_LABELS[issueType] || issueType;
  const desc = ISSUE_DESCRIPTIONS[issueType] || '';

  let html = `<h2>${isComp ? '⚠ ' : ''}${escapeHtml(label)}</h2>`;
  html += `<p class="section-meta">${flags.length} flagged appointment${flags.length === 1 ? '' : 's'} · `;
  if (isComp) html += `<span class="compliance-tag">Compliance</span> · `;
  html += `<span class="subtle">${escapeHtml(desc)}</span></p>`;

  if (isComp) {
    html += `<div class="compliance-banner"><strong>Compliance bucket.</strong> Findings here warrant manager review of the actual setter conversation, not just a coaching nudge.</div>`;
  }

  // State distribution
  const stateCounts = {};
  flags.forEach(f => { stateCounts[f.state] = (stateCounts[f.state] || 0) + 1; });
  const stateEntries = Object.entries(stateCounts).sort((a, b) => b[1] - a[1]);
  html += `<div class="card-grid">`;
  stateEntries.forEach(([s, c]) => {
    html += `<div class="card"><div class="label">${escapeHtml(STATE_FULL[s] || s)}</div><div class="value">${c}</div></div>`;
  });
  html += `</div>`;

  // Setter recurrence (those with 2+)
  const setterCounts = {};
  flags.forEach(f => {
    if (f.setter !== '(no setter)') setterCounts[f.setter] = (setterCounts[f.setter] || 0) + 1;
  });
  const repeatSetters = Object.entries(setterCounts).filter(([s, c]) => c > 1).sort((a, b) => b[1] - a[1]);
  if (repeatSetters.length) {
    html += `<div class="section">`;
    html += `<div class="section-header"><h2>Setters with multiple flags in this category</h2><span class="subtle">Single flags can be customer outliers; multiple flags from the same setter is a pattern</span></div>`;
    html += `<table><thead><tr><th>Setter</th><th class="num">Flags</th></tr></thead><tbody>`;
    repeatSetters.forEach(([s, c]) => {
      html += `<tr><td>${escapeHtml(s)}</td><td class="num">${c}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Filterable flag table
  html += `<div class="section" id="issue-section-${issueType}">`;
  html += `<div class="section-header"><h2>Flagged appointments</h2><span class="subtle" id="flag-count-${issueType}"></span></div>`;
  html += `<div class="filters">`;
  html += `<div class="filter-group"><label>Search note</label><input type="search" data-filter="search" placeholder="word in note..."></div>`;
  html += `<div class="filter-group"><label>State</label><select data-filter="state"><option value="">All</option>${DATA.scope.states.map(s => `<option value="${s}">${escapeHtml(STATE_FULL[s] || s)}</option>`).join('')}</select></div>`;
  html += `<div class="filter-group"><label>Setter</label><input type="search" data-filter="setter" placeholder="setter name..."></div>`;
  html += `<button class="clear-btn" data-filter-clear>Clear</button>`;
  html += `<button class="clear-btn" data-toggle-all>Expand all</button>`;
  html += `<button class="export-btn" data-export="${issueType}">Export CSV</button>`;
  html += `</div>`;
  html += `<table class="expandable sortable" data-issue="${issueType}"><thead><tr>`;
  html += `<th>Job</th><th>Customer</th><th>State</th><th>Office</th><th>Setter</th><th>Outcome</th><th class="num">Apts</th>`;
  html += `</tr></thead><tbody></tbody></table>`;
  html += `</div>`;

  return html;
}

function wireIssuePanel(panel, issueType) {
  const flags = flagsByIssue[issueType] || [];
  const search = panel.querySelector('input[data-filter="search"]');
  const stateF = panel.querySelector('select[data-filter="state"]');
  const setterF = panel.querySelector('input[data-filter="setter"]');
  const clearBtn = panel.querySelector('button[data-filter-clear]');
  const toggleAllBtn = panel.querySelector('button[data-toggle-all]');
  const exportBtn = panel.querySelector('button[data-export]');
  const tbody = panel.querySelector('table.expandable tbody');
  const countEl = panel.querySelector(`#flag-count-${issueType}`);

  // Lifted to outer scope so toggle-all can access the same filtered set as refresh()
  let currentFiltered = [];

  function refresh() {
    const q = (search.value || '').trim().toLowerCase();
    const st = stateF.value;
    const stq = (setterF.value || '').trim().toLowerCase();
    const filtered = flags.filter(f => {
      if (st && f.state !== st) return false;
      if (stq && !(f.setter || '').toLowerCase().includes(stq)) return false;
      if (q && !(f.note_excerpt || '').toLowerCase().includes(q)) return false;
      return true;
    });
    currentFiltered = filtered;
    countEl.textContent = `${filtered.length} of ${flags.length}`;
    tbody.innerHTML = filtered.map((f, i) => {
      const apt = f.dl_appointment_count > 1 ? `<strong>${f.dl_appointment_count}</strong>` : '1';
      return `<tr class="row" data-row-idx="${i}">
        <td>${escapeHtml(f.job_number)}</td>
        <td>${escapeHtml((f.customer || '').slice(0, 28))}</td>
        <td>${escapeHtml(f.state)}</td>
        <td>${escapeHtml((f.office || '').slice(0, 28))}</td>
        <td>${escapeHtml(f.setter)}</td>
        <td>${escapeHtml(f.outcome || '-')}</td>
        <td class="num">${apt}</td>
      </tr>
      <tr class="note-row" data-note-for="${i}" style="display:none;"><td colspan="7"></td></tr>`;
    }).join('');
    // Wire up expansion
    tbody.querySelectorAll('tr.row').forEach(row => {
      row.onclick = () => {
        const idx = row.dataset.rowIdx;
        const noteRow = tbody.querySelector(`tr.note-row[data-note-for="${idx}"]`);
        const f = filtered[idx];
        if (noteRow.style.display === 'none') {
          const matched = (f.matched || []).filter(m => m.issue_type === issueType).map(m => `<span class="matched">"${escapeHtml(m.matched)}"</span>`).join(', ');
          noteRow.firstElementChild.innerHTML = renderExpansion(f, matched);
          noteRow.style.display = '';
          row.classList.add('expanded');
        } else {
          noteRow.style.display = 'none';
          row.classList.remove('expanded');
        }
      };
    });
  }
  // Wrapped refresh resets the toggle button label since rows are re-rendered (all collapsed)
  const wrappedRefresh = () => { refresh(); toggleAllBtn.textContent = 'Expand all'; };
  search.oninput = wrappedRefresh;
  stateF.onchange = wrappedRefresh;
  setterF.oninput = wrappedRefresh;
  clearBtn.onclick = () => { search.value=''; stateF.value=''; setterF.value=''; wrappedRefresh(); };
  toggleAllBtn.onclick = () => {
    const noteRows = tbody.querySelectorAll('tr.note-row');
    const anyHidden = Array.from(noteRows).some(nr => nr.style.display === 'none');
    noteRows.forEach(nr => {
      const idx = nr.dataset.noteFor;
      const dataRow = tbody.querySelector(`tr.row[data-row-idx="${idx}"]`);
      if (anyHidden) {
        // Expanding: populate note content if empty (mirrors row.onclick)
        const f = currentFiltered[parseInt(idx)];
        if (f && !nr.firstElementChild.innerHTML.trim()) {
          const matched = (f.matched || [])
            .filter(m => m.issue_type === issueType)
            .map(m => `<span class="matched">"${escapeHtml(m.matched)}"</span>`)
            .join(', ');
          nr.firstElementChild.innerHTML = renderExpansion(f, matched);
        }
        nr.style.display = '';
        if (dataRow) dataRow.classList.add('expanded');
      } else {
        nr.style.display = 'none';
        if (dataRow) dataRow.classList.remove('expanded');
      }
    });
    toggleAllBtn.textContent = anyHidden ? 'Collapse all' : 'Expand all';
  };
  exportBtn.onclick = () => {
    const q = (search.value || '').trim().toLowerCase();
    const st = stateF.value;
    const stq = (setterF.value || '').trim().toLowerCase();
    const filtered = flags.filter(f => {
      if (st && f.state !== st) return false;
      if (stq && !(f.setter || '').toLowerCase().includes(stq)) return false;
      if (q && !(f.note_excerpt || '').toLowerCase().includes(q)) return false;
      return true;
    });
    exportFlagsCsv(filtered, issueType, `lead-audit-${issueType}.csv`);
  };
  refresh();
}

// ---- helpers: tables, export ----
// Build the expansion HTML for a flagged appointment row.
// Shows: note, matched phrases, appointment date(s), DL/address/sub-code.
function renderExpansion(f, matchedHtml) {
  const isMulti = (f.dl_appointment_count || 1) > 1;
  let dateLine = '';
  if (isMulti) {
    const dates = f.dl_start_time_sequence || [];
    const outcomes = f.dl_outcome_sequence || [];
    const pairs = [];
    const n = Math.max(dates.length, outcomes.length);
    for (let i = 0; i < n; i++) {
      const d = dates[i] || '';
      const o = outcomes[i] || '';
      const piece = (d && o) ? `${escapeHtml(d)} (${escapeHtml(o)})` : escapeHtml(d || o);
      if (piece) pairs.push(piece);
    }
    dateLine = `<div class="meta"><strong>Lead has ${f.dl_appointment_count} appointments:</strong> ${pairs.join(' → ')}</div>`;
  } else {
    dateLine = f.start_time ? `<div class="meta"><strong>Appointment date:</strong> ${escapeHtml(f.start_time)}</div>` : '';
  }
  // Show secondary issue tags if any
  const secondary = (f.secondary_issue_types || []).map(t => ISSUE_LABELS[t] || t);
  const secondaryLine = secondary.length
    ? `<div class="meta"><strong>Also matched:</strong> ${secondary.map(s => escapeHtml(s)).join(', ')}</div>`
    : '';
  return `<div><strong>Note:</strong> ${escapeHtml(f.note_excerpt)}</div>` +
    (matchedHtml ? `<div class="meta">Matched: ${matchedHtml}</div>` : '') +
    dateLine +
    secondaryLine +
    `<div class="meta">DL: ${escapeHtml(f.dl_number || '-')} | Address: ${escapeHtml(f.address || '')} | Sub-code: ${escapeHtml(f.lead_subcode || '')}</div>`;
}

function renderFlagsTable(flags, opts) {
  if (!flags || !flags.length) return '<div class="empty">No flags.</div>';
  let html = `<table class="expandable"><thead><tr>`;
  if (opts && opts.showIssue) html += `<th>Issue</th>`;
  html += `<th>Job</th><th>Customer</th><th>State</th><th>Setter</th><th>Outcome</th></tr></thead><tbody>`;
  flags.forEach((f, i) => {
    let issueCell = '';
    if (opts && opts.showIssue) {
      const compTypes = (f.issue_types || []).filter(t => COMPLIANCE_TYPES.has(t));
      const types = compTypes.length ? compTypes : f.issue_types;
      issueCell = `<td>${types.map(t => `<span class="compliance-tag">${escapeHtml(ISSUE_LABELS[t] || t)}</span>`).join(' ')}</td>`;
    }
    html += `<tr class="row" data-row-idx="${i}">${issueCell}<td>${escapeHtml(f.job_number)}</td><td>${escapeHtml((f.customer||'').slice(0,28))}</td><td>${escapeHtml(f.state)}</td><td>${escapeHtml(f.setter)}</td><td>${escapeHtml((f.outcome||'').slice(0,30))}</td></tr>`;
    const compMatched = (f.matched || []).filter(m => COMPLIANCE_TYPES.has(m.issue_type)).map(m => `<span class="matched">"${escapeHtml(m.matched)}"</span>`).join(', ');
    html += `<tr class="note-row" data-note-for="${i}" style="display:none;"><td colspan="${opts && opts.showIssue ? 6 : 5}">${renderExpansion(f, compMatched)}</td></tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

function wireSortableTable(table) {
  const headers = table.querySelectorAll('th');
  headers.forEach((th, idx) => {
    th.onclick = () => {
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr.row, tr:not(.note-row):not(.row)'));
      const isAsc = th.classList.contains('sort-asc');
      headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
      const isNum = th.classList.contains('num');
      rows.sort((a, b) => {
        let av = a.cells[idx]?.textContent.trim() || '';
        let bv = b.cells[idx]?.textContent.trim() || '';
        if (isNum) {
          av = parseFloat(av.replace(/[^\d.\-]/g, '')) || 0;
          bv = parseFloat(bv.replace(/[^\d.\-]/g, '')) || 0;
        } else {
          av = av.toLowerCase(); bv = bv.toLowerCase();
        }
        return isAsc ? (av < bv ? 1 : av > bv ? -1 : 0) : (av < bv ? -1 : av > bv ? 1 : 0);
      });
      // Re-append, preserving note-row pairs
      const noteRows = Array.from(tbody.querySelectorAll('tr.note-row'));
      const idxMap = new Map();
      noteRows.forEach(nr => idxMap.set(nr.dataset.noteFor, nr));
      tbody.innerHTML = '';
      rows.forEach(r => {
        tbody.appendChild(r);
        const ridx = r.dataset.rowIdx;
        if (ridx && idxMap.get(ridx)) tbody.appendChild(idxMap.get(ridx));
      });
    };
  });
}

function wireExpandable(tbody) {
  tbody.querySelectorAll('tr.row').forEach(row => {
    if (row.onclick) return;
    row.onclick = () => {
      const idx = row.dataset.rowIdx;
      const noteRow = tbody.querySelector(`tr.note-row[data-note-for="${idx}"]`);
      if (!noteRow) return;
      noteRow.style.display = noteRow.style.display === 'none' ? '' : 'none';
      row.classList.toggle('expanded', noteRow.style.display === '');
    };
  });
}

function exportFlagsCsv(flags, issueType, filename) {
  const rows = [['Job', 'DL', 'Customer', 'State', 'Office', 'Setter', 'Outcome', 'Sub-code', 'Apt count', 'Issue types', 'Matched phrases', 'Note excerpt']];
  flags.forEach(f => {
    const matched = (f.matched || []).filter(m => !issueType || m.issue_type === issueType).map(m => m.matched).join('; ');
    rows.push([
      f.job_number || '', f.dl_number || '', f.customer || '', f.state || '',
      f.office || '', f.setter || '', f.outcome || '', f.lead_subcode || '',
      f.dl_appointment_count || 1, (f.issue_types || []).join('; '),
      matched, f.note_excerpt || ''
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

function exportTable(tableId, filename) {
  const table = document.getElementById(tableId);
  const rows = Array.from(table.querySelectorAll('tr')).map(tr => Array.from(tr.cells).map(c => c.textContent.trim()));
  const csv = rows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

// ---- theme toggle (light/dark) ---------------------------------------
(function initTheme() {
  const btn = document.getElementById('theme-toggle');
  const STORAGE_KEY = 'lead-audit-theme';
  function apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
    try { localStorage.setItem(STORAGE_KEY, theme); } catch (e) {}
  }
  let stored = null;
  try { stored = localStorage.getItem(STORAGE_KEY); } catch (e) {}
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  apply(stored || (prefersDark ? 'dark' : 'light'));
  btn.onclick = () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    apply(cur === 'dark' ? 'light' : 'dark');
  };
})();

// ---- init ----
renderScope();
renderTabs();
renderPanels();
</script>
